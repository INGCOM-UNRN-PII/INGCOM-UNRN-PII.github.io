<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css"><![CDATA[
/* SVG Embedded Styles - UNRN */
.title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #192437; text-anchor: middle; }
.subtitle { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #2d3a50; text-anchor: middle; }
.label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #404040; }
.label-bold { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #192437; }
.label-small { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; font-weight: 400; fill: #525252; }
.index { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; font-weight: 400; fill: #737373; }
.code { font-family: 'Consolas', 'Courier New', monospace; font-size: 11px; font-weight: 400; fill: #404040; }
.code-comment { font-family: 'Consolas', 'Courier New', monospace; font-size: 10px; font-weight: 400; fill: #737373; font-style: italic; }
.code-keyword { font-family: 'Consolas', 'Courier New', monospace; font-size: 11px; font-weight: 700; fill: #eb2141; }
.node { fill: #ffffff; stroke: #404040; stroke-width: 2; }
.node-header { fill: #f5f5f5; stroke: #404040; stroke-width: 1; }
.node-data { fill: #e8ebf0; stroke: #a3a3a3; stroke-width: 1.5; }
.node-pointer { fill: #ffccbc; stroke: #a3a3a3; stroke-width: 1.5; }
.node-null { fill: #e5e5e5; stroke: #737373; stroke-width: 1.5; stroke-dasharray: 3,3; }
.node-highlight { fill: #fff3e0; stroke: #eb2141; stroke-width: 2.5; }
.stack-node { fill: #ffffff; stroke: #eb2141; stroke-width: 2; }
.stack-data { fill: #ffe0e0; stroke: #a3a3a3; stroke-width: 1.5; }
.stack-pointer { fill: #ffc9c9; stroke: #a3a3a3; stroke-width: 1.5; }
.stack-arrow { fill: none; stroke: #eb2141; stroke-width: 2; }
.stack-label { fill: #eb2141; font-weight: 700; }
.queue-node { fill: #ffffff; stroke: #2e7d32; stroke-width: 2; }
.queue-data { fill: #c8e6c9; stroke: #a3a3a3; stroke-width: 1.5; }
.queue-pointer { fill: #a5d6a7; stroke: #a3a3a3; stroke-width: 1.5; }
.queue-arrow { fill: none; stroke: #2e7d32; stroke-width: 2; }
.queue-label { fill: #2e7d32; font-weight: 700; }
.deque-node { fill: #ffffff; stroke: #6a1b9a; stroke-width: 2; }
.deque-data { fill: #e1bee7; stroke: #a3a3a3; stroke-width: 1.5; }
.deque-pointer { fill: #ce93d8; stroke: #a3a3a3; stroke-width: 1.5; }
.deque-arrow { fill: none; stroke: #6a1b9a; stroke-width: 2; }
.deque-label { fill: #6a1b9a; font-weight: 700; }
.list-node { fill: #ffffff; stroke: #1565c0; stroke-width: 2; }
.list-data { fill: #bbdefb; stroke: #a3a3a3; stroke-width: 1.5; }
.list-pointer { fill: #90caf9; stroke: #a3a3a3; stroke-width: 1.5; }
.list-arrow { fill: none; stroke: #1565c0; stroke-width: 2; }
.list-label { fill: #1565c0; font-weight: 700; }
.tree-node { fill: #ffffff; stroke: #558b2f; stroke-width: 2; }
.tree-data { fill: #dcedc8; stroke: #a3a3a3; stroke-width: 1.5; }
.tree-arrow { fill: none; stroke: #558b2f; stroke-width: 2; }
.tree-label { fill: #558b2f; font-weight: 700; }
.graph-node { fill: #ffffff; stroke: #e65100; stroke-width: 2; }
.graph-data { fill: #ffe0b2; stroke: #a3a3a3; stroke-width: 1.5; }
.graph-arrow { fill: none; stroke: #e65100; stroke-width: 2; }
.graph-label { fill: #e65100; font-weight: 700; }
.hash-node { fill: #ffffff; stroke: #283593; stroke-width: 2; }
.hash-data { fill: #c5cae9; stroke: #a3a3a3; stroke-width: 1.5; }
.hash-arrow { fill: none; stroke: #283593; stroke-width: 2; }
.arrow { fill: none; stroke: #404040; stroke-width: 2; }
.arrow-primary { fill: none; stroke: #eb2141; stroke-width: 2; }
.arrow-secondary { fill: none; stroke: #192437; stroke-width: 2; }
.arrow-dashed { fill: none; stroke: #737373; stroke-width: 2; stroke-dasharray: 5,5; }
.code-block { fill: #f5f5f5; stroke: #d4d4d4; stroke-width: 1; rx: 3; }
.highlight-box { fill: #fce8ec; stroke: #eb2141; stroke-width: 1; rx: 3; }
.info-box { fill: #e8ebf0; stroke: #2d3a50; stroke-width: 1; rx: 3; }
.memory-cell { fill: #ffffff; stroke: #525252; stroke-width: 1.5; }
.memory-cell-filled { fill: #e8ebf0; stroke: #525252; stroke-width: 1.5; }
.divider { stroke: #d4d4d4; stroke-width: 1; }
.divider-bold { stroke: #525252; stroke-width: 2; }
.valid { stroke: #2e7d32; stroke-width: 2.5; }
.invalid { stroke: #eb2141; stroke-width: 2.5; }
.warning { stroke: #f57c00; stroke-width: 2.5; }
.text-center { text-anchor: middle; }
.text-start { text-anchor: start; }
.text-end { text-anchor: end; }
    ]]></style>
  </defs>
  <title>Jerarquía de Tipos Primitivos en Java</title>
  
  <!-- Título -->
  <text x="400" y="30" class="title">Tipos Primitivos en Java (8 tipos)</text>
  
  <!-- Tipos Enteros -->
  <g id="enteros">
    <text x="100" y="70" class="subtitle">Tipos Enteros</text>
    
    <!-- byte -->
    <rect x="20" y="90" width="160" height="60" class="node-data"/>
    <text x="100" y="110" class="label-bold text-center">byte</text>
    <text x="100" y="125" class="label-small text-center">8 bits</text>
    <text x="100" y="140" class="code text-center">-128 a 127</text>
    
    <!-- short -->
    <rect x="20" y="160" width="160" height="60" class="node-data"/>
    <text x="100" y="180" class="label-bold text-center">short</text>
    <text x="100" y="195" class="label-small text-center">16 bits</text>
    <text x="100" y="210" class="code text-center">-32,768 a 32,767</text>
    
    <!-- int -->
    <rect x="20" y="230" width="160" height="60" class="node-highlight"/>
    <text x="100" y="250" class="label-bold text-center">int</text>
    <text x="100" y="265" class="label-small text-center">32 bits (por defecto)</text>
    <text x="100" y="280" class="code text-center">-2³¹ a 2³¹-1</text>
    
    <!-- long -->
    <rect x="20" y="300" width="160" height="60" class="node-data"/>
    <text x="100" y="320" class="label-bold text-center">long</text>
    <text x="100" y="335" class="label-small text-center">64 bits</text>
    <text x="100" y="350" class="code text-center">-2⁶³ a 2⁶³-1</text>
  </g>
  
  <!-- Tipos de Punto Flotante -->
  <g id="flotantes">
    <text x="350" y="70" class="subtitle">Punto Flotante</text>
    
    <!-- float -->
    <rect x="250" y="90" width="200" height="60" class="node-data"/>
    <text x="350" y="110" class="label-bold text-center">float</text>
    <text x="350" y="125" class="label-small text-center">32 bits (IEEE 754)</text>
    <text x="350" y="140" class="code text-center">±3.4 × 10³⁸</text>
    
    <!-- double -->
    <rect x="250" y="160" width="200" height="60" class="node-highlight"/>
    <text x="350" y="180" class="label-bold text-center">double</text>
    <text x="350" y="195" class="label-small text-center">64 bits (por defecto)</text>
    <text x="350" y="210" class="code text-center">±1.7 × 10³⁰⁸</text>
  </g>
  
  <!-- Tipo Booleano -->
  <g id="booleano">
    <text x="600" y="70" class="subtitle">Lógico</text>
    
    <rect x="520" y="90" width="160" height="60" class="node-data"/>
    <text x="600" y="110" class="label-bold text-center">boolean</text>
    <text x="600" y="125" class="label-small text-center">1 bit lógico</text>
    <text x="600" y="140" class="code text-center">true / false</text>
  </g>
  
  <!-- Tipo Carácter -->
  <g id="caracter">
    <text x="600" y="180" class="subtitle">Carácter</text>
    
    <rect x="520" y="200" width="160" height="60" class="node-data"/>
    <text x="600" y="220" class="label-bold text-center">char</text>
    <text x="600" y="235" class="label-small text-center">16 bits (Unicode UTF-16)</text>
    <text x="600" y="250" class="code text-center">0 a 65,535</text>
  </g>
  
  <!-- Notas comparativas con C -->
  <rect x="20" y="380" width="760" height="1" class="divider"/>
  
  <text x="30" y="395" class="label-small">⚠️ Diferencias con C: tamaños garantizados, boolean nativo, char de 16 bits (Unicode)</text>
</svg>
