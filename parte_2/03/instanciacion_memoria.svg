<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="600" height="350" viewBox="0 0 600 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      :root {
        --unrn-red: #eb2141;
        --unrn-dark-blue: #192437;
        --blue-lightest: #e8ebf0;
        --gray-50: #fafafa;
        --gray-100: #f5f5f5;
        --gray-200: #e5e5e5;
        --gray-300: #d4d4d4;
        --gray-400: #a3a3a3;
        --gray-600: #525252;
        --gray-700: #404040;
      }
      .title { font-family: 'Fabrikat', sans-serif; font-size: 16px; font-weight: 700; fill: var(--unrn-dark-blue); text-anchor: middle; }
      .label { font-family: 'Lato', sans-serif; font-size: 12px; fill: var(--gray-700); }
      .label-bold { font-family: 'Lato', sans-serif; font-size: 12px; font-weight: 700; fill: var(--unrn-dark-blue); }
      .node { fill: #ffffff; stroke: var(--gray-700); stroke-width: 2; }
      .node-data { fill: var(--blue-lightest); stroke: var(--gray-400); stroke-width: 1.5; }
      .arrow { fill: none; stroke: var(--gray-700); stroke-width: 2; marker-end: url(#arrowhead); }
      .code { font-family: 'Share Tech Mono', monospace; font-size: 11px; fill: var(--gray-700); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#404040"/>
    </marker>
  </defs>

  <rect width="600" height="350" fill="#ffffff"/>
  
  <text x="120" y="40" class="title">STACK</text>
  <text x="440" y="40" class="title">HEAP</text>
  
  <!-- Heap Background -->
  <rect x="280" y="60" width="300" height="260" rx="5" class="node" style="stroke: var(--gray-300); fill: var(--gray-50); stroke-dasharray: 5,5;"/>

  <!-- Juan on Stack -->
  <rect x="40" y="80" width="160" height="60" class="node"/>
  <text x="50" y="105" class="label-bold">juan</text>
  <text x="50" y="125" class="label" style="font-size: 10px;">(0x7A3F)</text>
  <path d="M 200 110 L 320 110" class="arrow"/>

  <!-- Maria on Stack -->
  <rect x="40" y="200" width="160" height="60" class="node"/>
  <text x="50" y="225" class="label-bold">maria</text>
  <text x="50" y="245" class="label" style="font-size: 10px;">(0x8B2C)</text>
  <path d="M 200 230 L 320 230" class="arrow"/>

  <!-- Object 1 (Juan) in Heap -->
  <rect x="330" y="75" width="220" height="90" rx="3" class="node" style="stroke: var(--unrn-red);"/>
  <rect x="340" y="95" width="200" height="40" class="node-data"/>
  <text x="350" y="112" class="code">nombre: "Juan"</text>
  <text x="350" y="128" class="code">edad: 25</text>
  <text x="440" y="180" class="label-small" style="text-anchor: middle; font-size: 10px;">(0x7A3F)</text>

  <!-- Object 2 (Maria) in Heap -->
  <rect x="330" y="205" width="220" height="90" rx="3" class="node" style="stroke: var(--unrn-red);"/>
  <rect x="340" y="225" width="200" height="40" class="node-data"/>
  <text x="350" y="242" class="code">nombre: "María"</text>
  <text x="350" y="258" class="code">edad: 30</text>
  <text x="440" y="310" class="label-small" style="text-anchor: middle; font-size: 10px;">(0x8B2C)</text>

</svg>
