  <style
     id="style1">.title { font-family: 'Fabrikat', Arial, sans-serif; font-size: 16px; font-weight: 700; fill: var(--unrn-dark-blue); text-anchor: middle; }
.label { font-family: 'Lato', Arial, sans-serif; font-size: 12px; fill: var(--gray-700); }
