<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="750" height="350" viewBox="0 0 750 350" xmlns="http://www.w3.org/2000/svg">
<style>
  :root {
    --unrn-red: #eb2141;
    --unrn-dark-blue: #192437;
    --blue-light: #2d3a50;
    --blue-lightest: #e8ebf0;
    --gray-100: #f5f5f5;
    --gray-300: #d4d4d4;
    --gray-400: #a3a3a3;
    --gray-500: #737373;
    --gray-600: #525252;
    --gray-700: #404040;
    --red-lightest: #fce8ec;
  }
  .title { font-family: 'Fabrikat', Arial, sans-serif; font-size: 16px; font-weight: 700; fill: var(--unrn-dark-blue); text-anchor: middle; }
  .label { font-family: 'Lato', Arial, sans-serif; font-size: 12px; fill: var(--gray-700); }
  .label-bold { font-family: 'Lato', Arial, sans-serif; font-size: 12px; font-weight: 700; fill: var(--unrn-dark-blue); }
  .label-small { font-family: 'Lato', Arial, sans-serif; font-size: 10px; fill: var(--gray-600); }
  .code { font-family: 'Share Tech Mono', monospace; font-size: 11px; fill: var(--gray-700); }
  .code-comment { font-family: 'Share Tech Mono', monospace; font-size: 10px; fill: var(--gray-500); font-style: italic; }
  .node { fill: #ffffff; stroke: var(--gray-700); stroke-width: 2; }
  .node-data { fill: var(--blue-lightest); stroke: var(--gray-400); stroke-width: 1.5; }
  .node-highlight { fill: #fff3e0; stroke: var(--unrn-red); stroke-width: 2.5; }
  .info-box { fill: var(--blue-lightest); stroke: var(--blue-light); stroke-width: 1; rx: 3; }
  .code-block { fill: var(--gray-100); stroke: var(--gray-300); stroke-width: 1; rx: 3; }
  .highlight-box { fill: var(--red-lightest); stroke: var(--unrn-red); stroke-width: 1; rx: 3; }
  .memory-cell { fill: #ffffff; stroke: var(--gray-600); stroke-width: 1.5; }
  .arrow { fill: none; stroke: var(--gray-700); stroke-width: 2; }
  .divider { stroke: var(--gray-300); stroke-width: 1; }
  .divider-bold { stroke: var(--gray-600); stroke-width: 2; }
  .valid { stroke: #2e7d32; stroke-width: 2.5; }
  .invalid { stroke: var(--unrn-red); stroke-width: 2.5; }
  .divider-dashed { stroke: var(--gray-300); stroke-width: 1; stroke-dasharray: 4; }
</style>
  <text x="375" y="30" class="title">Abstracción Contextual: El concepto "Libro"</text>
  
  <!-- Biblioteca -->
  <rect x="20" y="60" width="220" height="240" class="node"/>
  <rect x="20" y="60" width="220" height="35" class="node-highlight"/>
  <text x="130" y="83" class="label-bold" fill="white">A. Biblioteca</text>
  <text x="30" y="115" class="label-small">isbn, titulo, autor</text>
  <text x="30" y="135" class="label-small">ejemplaresDisponibles</text>
  <text x="30" y="155" class="label-small">ubicacionEstante</text>
  <line x1="20" y1="170" x2="240" y2="170" class="divider"/>
  <text x="30" y="195" class="code">estaDisponible()</text>
  <text x="30" y="215" class="code">prestar()</text>
  <text x="30" y="235" class="code">devolver()</text>
  <text x="130" y="275" class="label-small" fill="var(--unrn-dark-blue)">Enfoque: Disponibilidad</text>
  
  <!-- Librería Online -->
  <rect x="265" y="60" width="220" height="240" class="node"/>
  <rect x="265" y="60" width="220" height="35" class="node-highlight"/>
  <text x="375" y="83" class="label-bold" fill="white">B. Librería Online</text>
  <text x="275" y="115" class="label-small">isbn, titulo, precio</text>
  <text x="275" y="135" class="label-small">stock, editorial</text>
  <text x="275" y="155" class="label-small">pesoEnvio</text>
  <line x1="265" y1="170" x2="485" y2="170" class="divider"/>
  <text x="275" y="195" class="code">calcularEnvio()</text>
  <text x="275" y="215" class="code">aplicarDescuento()</text>
  <text x="275" y="235" class="code">agregarAlCarrito()</text>
  <text x="375" y="275" class="label-small" fill="var(--unrn-dark-blue)">Enfoque: Transacción</text>
  
  <!-- Recomendaciones -->
  <rect x="510" y="60" width="220" height="240" class="node"/>
  <rect x="510" y="60" width="220" height="35" class="node-highlight"/>
  <text x="620" y="83" class="label-bold" fill="white">C. Recomendaciones</text>
  <text x="520" y="115" class="label-small">genero, etiquetas</text>
  <text x="520" y="135" class="label-small">puntuacionPromedio</text>
  <text x="520" y="155" class="label-small">cantidadResenas</text>
  <line x1="510" y1="170" x2="730" y2="170" class="divider"/>
  <text x="520" y="195" class="code">esParecidoA()</text>
  <text x="520" y="215" class="code">librosSimilares()</text>
  <text x="520" y="235" class="code">afinidadUsuario()</text>
  <text x="620" y="275" class="label-small" fill="var(--unrn-dark-blue)">Enfoque: Contenido</text>
</svg>