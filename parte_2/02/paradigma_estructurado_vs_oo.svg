<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="600" height="350" viewBox="0 0 600 350" xmlns="http://www.w3.org/2000/svg">
  <style>
    @font-face { font-family: 'Fabrikat'; font-weight: 700; src: local('Arial'); }
    @font-face { font-family: 'Lato'; font-weight: 400; src: local('Arial'); }
    @font-face { font-family: 'Share Tech Mono'; src: local('Courier New'); }
    :root {
      --unrn-red: #eb2141;
      --unrn-dark-blue: #192437;
      --gray-100: #f5f5f5;
      --gray-300: #d4d4d4;
      --gray-400: #a3a3a3;
      --gray-700: #404040;
      --blue-lightest: #e8ebf0;
    }
    .title { font-family: 'Fabrikat', sans-serif; font-size: 16px; font-weight: 700; fill: var(--unrn-dark-blue); text-anchor: middle; }
    .subtitle { font-family: 'Fabrikat', sans-serif; font-size: 14px; font-weight: 500; fill: #2d3a50; text-anchor: middle; }
    .label { font-family: 'Lato', sans-serif; font-size: 12px; fill: var(--gray-700); }
    .label-bold { font-family: 'Lato', sans-serif; font-size: 12px; font-weight: 700; fill: var(--unrn-dark-blue); }
    .code { font-family: 'Share Tech Mono', monospace; font-size: 11px; fill: var(--gray-700); }
    .node { fill: #ffffff; stroke: var(--gray-700); stroke-width: 2; }
    .node-header { fill: var(--gray-100); stroke: var(--gray-700); stroke-width: 1; }
    .node-data { fill: var(--blue-lightest); stroke: var(--gray-400); stroke-width: 1.5; }
    .node-highlight { fill: #ffffff; stroke: var(--unrn-red); stroke-width: 2.5; }
  </style>
  
  <text x="150" y="30" class="subtitle">Paradigma estructurado:</text>
  <text x="450" y="30" class="subtitle">Paradigma OO:</text>
  
  <!-- Left Side -->
  <rect x="50" y="60" width="140" height="100" class="node"/>
  <rect x="50" y="60" width="140" height="25" class="node-header"/>
  <text x="120" y="78" class="label-bold" text-anchor="middle">DATOS</text>
  <text x="60" y="100" class="code">struct Persona {</text>
  <text x="70" y="115" class="code">  nombre;</text>
  <text x="70" y="130" class="code">  edad;</text>
  <text x="60" y="145" class="code">}</text>
  
  <rect x="50" y="180" width="140" height="70" class="node"/>
  <rect x="50" y="180" width="140" height="25" class="node-header"/>
  <text x="120" y="198" class="label-bold" text-anchor="middle">FUNCIONES</text>
  <text x="60" y="220" class="code">saludar(p)</text>
  <text x="60" y="235" class="code">cumplir(p)</text>
  
  <text x="120" y="280" class="label" text-anchor="middle">Datos y funciones</text>
  <text x="120" y="295" class="label" text-anchor="middle">están separados</text>
  
  <!-- Right Side -->
  <rect x="350" y="60" width="200" height="210" class="node-highlight"/>
  <rect x="350" y="60" width="200" height="25" class="node-header"/>
  <text x="450" y="78" class="label-bold" text-anchor="middle">OBJETO</text>
  
  <rect x="370" y="95" width="160" height="60" class="node-data"/>
  <text x="450" y="115" class="label-bold" text-anchor="middle">DATOS</text>
  <text x="380" y="135" class="code">nombre, edad</text>
  
  <rect x="370" y="170" width="160" height="75" class="node-data"/>
  <text x="450" y="190" class="label-bold" text-anchor="middle">COMPORTAMIENTO</text>
  <text x="380" y="210" class="code">saludar()</text>
  <text x="380" y="225" class="code">cumplirAnios()</text>
  
  <text x="450" y="300" class="label" text-anchor="middle">El objeto es una unidad</text>
  <text x="450" y="315" class="label" text-anchor="middle">indivisible</text>
</svg>
