<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="450" height="100" viewBox="0 0 450 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    @font-face { font-family: 'Lato'; font-weight: 700; src: local('Arial'); }
    .label-bold { font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700; fill: #192437; }
    .label { font-family: 'Lato', sans-serif; font-size: 12px; fill: #404040; }
    .node { fill: #ffffff; stroke: #404040; stroke-width: 2; }
    .line { stroke: #404040; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="open-diamond" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto">
      <path d="M 0,6 L 6,12 L 12,6 L 6,0 Z" fill="#ffffff" stroke="#404040" stroke-width="1.5"/>
    </marker>
  </defs>
  <rect x="20" y="30" width="120" height="40" class="node"/>
  <text x="80" y="55" class="label-bold" text-anchor="middle">Departamento</text>
  
  <line x1="140" y1="50" x2="310" y2="50" class="line" marker-start="url(#open-diamond)"/>
  <text x="290" y="45" class="label">*</text>
  
  <rect x="310" y="30" width="120" height="40" class="node"/>
  <text x="370" y="55" class="label-bold" text-anchor="middle">Profesor</text>
</svg>
