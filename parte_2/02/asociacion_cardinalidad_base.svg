<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    @font-face { font-family: 'Lato'; font-weight: 700; src: local('Arial'); }
    .label-bold { font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700; fill: #192437; }
    .label { font-family: 'Lato', sans-serif; font-size: 12px; fill: #404040; }
    .node { fill: #ffffff; stroke: #404040; stroke-width: 2; }
    .line { stroke: #404040; stroke-width: 1.5; }
  </style>
  <rect x="20" y="30" width="80" height="40" class="node"/>
  <text x="60" y="55" class="label-bold" text-anchor="middle">A</text>
  
  <text x="110" y="45" class="label">cardX</text>
  <line x1="100" y1="50" x2="300" y2="50" class="line"/>
  <text x="270" y="45" class="label">cardY</text>
  
  <rect x="300" y="30" width="80" height="40" class="node"/>
  <text x="340" y="55" class="label-bold" text-anchor="middle">B</text>
</svg>
