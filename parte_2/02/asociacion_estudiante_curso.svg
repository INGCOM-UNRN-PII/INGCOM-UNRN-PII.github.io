<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    @font-face { font-family: 'Lato'; font-weight: 700; src: local('Arial'); }
    .label-bold { font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700; fill: #192437; }
    .node { fill: #ffffff; stroke: #404040; stroke-width: 2; }
    .arrow { fill: none; stroke: #404040; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#404040"/>
    </marker>
  </defs>
  <rect x="20" y="30" width="100" height="40" class="node"/>
  <text x="70" y="55" class="label-bold" text-anchor="middle">Estudiante</text>
  
  <path d="M 130,50 L 270,50" class="arrow" marker-start="url(#arrowhead)" marker-end="url(#arrowhead)"/>
  
  <rect x="280" y="30" width="100" height="40" class="node"/>
  <text x="330" y="55" class="label-bold" text-anchor="middle">Curso</text>
</svg>
