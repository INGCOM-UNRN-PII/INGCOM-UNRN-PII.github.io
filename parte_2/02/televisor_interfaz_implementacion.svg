<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    @font-face { font-family: 'Fabrikat'; font-weight: 700; src: local('Arial'); }
    @font-face { font-family: 'Lato'; font-weight: 400; src: local('Arial'); }
    @font-face { font-family: 'Share Tech Mono'; src: local('Courier New'); }
    :root {
      --unrn-red: #eb2141;
      --unrn-dark-blue: #192437;
      --gray-100: #f5f5f5;
      --gray-400: #a3a3a3;
      --gray-600: #525252;
      --gray-700: #404040;
    }
    .label-bold { font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700; fill: var(--unrn-dark-blue); }
    .code { font-family: 'Share Tech Mono', monospace; font-size: 12px; fill: var(--gray-700); }
    .node { fill: #ffffff; stroke: var(--unrn-dark-blue); stroke-width: 2; }
    .node-header { fill: var(--gray-100); stroke: var(--unrn-dark-blue); stroke-width: 1; }
    .divider-bold { stroke: var(--gray-400); stroke-width: 2; stroke-dasharray: 4; }
    .arrow-primary { fill: none; stroke: var(--unrn-red); stroke-width: 2.5; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#eb2141"/>
    </marker>
  </defs>
  
  <!-- Outer Box -->
  <rect x="180" y="40" width="380" height="320" class="node" rx="5"/>
  <rect x="180" y="40" width="380" height="40" class="node-header" rx="5"/>
  <text x="370" y="65" class="label-bold" text-anchor="middle">TELEVISOR</text>
  
  <!-- User -->
  <circle cx="60" cy="160" r="20" fill="none" stroke="#192437" stroke-width="2"/>
  <line x1="60" y1="180" x2="60" y2="220" stroke="#192437" stroke-width="2"/>
  <text x="60" y="245" class="label-bold" text-anchor="middle">Usuario</text>
  <path d="M 100,160 L 170,160" class="arrow-primary" marker-end="url(#arrowhead)"/>
  
  <!-- Public Interface -->
  <text x="210" y="110" class="label-bold">INTERFAZ PÚBLICA</text>
  <text x="225" y="135" class="code">├── encender()</text>
  <text x="225" y="155" class="code">├── apagar()</text>
  <text x="225" y="175" class="code">├── subirVolumen()</text>
  <text x="225" y="195" class="code">└── cambiarCanal()</text>
  
  <!-- Divider -->
  <line x1="200" y1="220" x2="540" y2="220" class="divider-bold"/>
  
  <!-- Hidden Implementation -->
  <text x="210" y="255" class="label-bold">IMPLEMENTACIÓN OCULTA</text>
  <text x="225" y="280" class="code">├── procesarSeñal()</text>
  <text x="225" y="300" class="code">├── decodificarVideo()</text>
  <text x="225" y="320" class="code">├── ajustarBrillo()</text>
  <text x="225" y="340" class="code">└── sincronizarAudio()</text>
</svg>
