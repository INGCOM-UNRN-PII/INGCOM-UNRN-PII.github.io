<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    @font-face { font-family: 'Lato'; font-weight: 700; src: local('Arial'); }
    .label-bold { font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700; fill: #192437; }
    .label { font-family: 'Lato', sans-serif; font-size: 11px; fill: #404040; }
    .node { fill: #ffffff; stroke: #404040; stroke-width: 1.5; }
    .line { stroke: #404040; stroke-width: 1.2; fill: none; }
  </style>
  <defs>
    <marker id="diamond" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M 0,5 L 5,10 L 10,5 L 5,0 Z" fill="#404040"/>
    </marker>
    <marker id="open-diamond" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M 0,5 L 5,10 L 10,5 L 5,0 Z" fill="#ffffff" stroke="#404040" stroke-width="1"/>
    </marker>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#404040"/>
    </marker>
  </defs>
  
  <!-- Hospital -->
  <rect x="50" y="50" width="100" height="40" class="node"/>
  <text x="100" y="75" class="label-bold" text-anchor="middle">Hospital</text>
  
  <!-- Hospital -> Piso -->
  <text x="160" y="60" class="label">1</text>
  <line x1="150" y1="70" x2="250" y2="70" class="line" marker-start="url(#diamond)"/>
  <text x="240" y="60" class="label">1..*</text>
  
  <!-- Piso -->
  <rect x="250" y="50" width="100" height="40" class="node"/>
  <text x="300" y="75" class="label-bold" text-anchor="middle">Piso</text>
  
  <!-- Piso -> Enfermera -->
  <text x="360" y="60" class="label">1</text>
  <line x1="350" y1="70" x2="450" y2="70" class="line" marker-start="url(#open-diamond)"/>
  <text x="440" y="60" class="label">1..*</text>
  
  <!-- Enfermera -->
  <rect x="450" y="50" width="100" height="40" class="node"/>
  <text x="500" y="75" class="label-bold" text-anchor="middle">Enfermera</text>
  
  <!-- Piso -> Habitacion -->
  <path d="M 300,90 L 300,160" class="line" marker-start="url(#diamond)"/>
  <text x="310" y="130" class="label">1..*</text>
  
  <!-- Habitacion -->
  <rect x="250" y="160" width="100" height="40" class="node"/>
  <text x="300" y="185" class="label-bold" text-anchor="middle">Habitacion</text>
  
  <!-- Habitacion -> Cama -->
  <path d="M 300,200 L 300,270" class="line" marker-start="url(#diamond)"/>
  <text x="310" y="240" class="label">1..4</text>
  
  <!-- Cama -->
  <rect x="250" y="270" width="100" height="40" class="node"/>
  <text x="300" y="295" class="label-bold" text-anchor="middle">Cama</text>
  
  <!-- Cama -> Paciente -->
  <line x1="350" y1="290" x2="480" y2="290" class="line"/>
  <text x="460" y="280" class="label">0..1</text>
  
  <!-- Paciente -->
  <rect x="480" y="270" width="100" height="40" class="node"/>
  <text x="530" y="295" class="label-bold" text-anchor="middle">Paciente</text>
  
  <!-- Paciente -> Medico -->
  <path d="M 530,310 L 530,380" class="line"/>
  <text x="540" y="345" class="label" text-anchor="middle">atiende</text>
  
  <!-- Medico -->
  <rect x="480" y="380" width="100" height="40" class="node"/>
  <text x="530" y="405" class="label-bold" text-anchor="middle">Medico</text>
  <text x="470" y="375" class="label">1..*</text>
  
  <!-- Medico -> Especialidad -->
  <line x1="580" y1="400" x2="680" y2="400" class="line" marker-start="url(#open-diamond)"/>
  <text x="660" y="390" class="label">1..*</text>
  
  <!-- Especialidad -->
  <rect x="680" y="380" width="110" height="40" class="node"/>
  <text x="735" y="405" class="label-bold" text-anchor="middle">Especialidad</text>
</svg>
