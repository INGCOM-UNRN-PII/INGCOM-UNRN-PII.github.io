<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="650" height="250" viewBox="0 0 650 250" xmlns="http://www.w3.org/2000/svg">
  <style>
    @font-face { font-family: 'Lato'; font-weight: 400; src: local('Arial'); }
    .label { font-family: 'Lato', sans-serif; font-size: 12px; fill: #404040; }
    .label-small { font-family: 'Lato', sans-serif; font-size: 11px; fill: #606060; }
    .node { fill: #f5f5f5; stroke: #404040; stroke-width: 1.5; rx: 3; }
    .arrow { fill: none; stroke: #eb2141; stroke-width: 2; }
    .arrow-dashed { fill: none; stroke: #404040; stroke-width: 1.5; stroke-dasharray: 4,4; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#eb2141"/>
    </marker>
    <marker id="arrowhead-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#404040"/>
    </marker>
  </defs>
  
  <rect x="20" y="20" width="100" height="40" class="node"/>
  <text x="70" y="45" class="label" text-anchor="middle">Jugador existe</text>
  
  <path d="M 120,40 L 170,40" class="arrow" marker-end="url(#arrowhead)"/>
  
  <rect x="180" y="20" width="120" height="40" class="node"/>
  <text x="240" y="45" class="label" text-anchor="middle">Se une al equipo</text>
  
  <path d="M 300,40 L 350,40" class="arrow" marker-end="url(#arrowhead)"/>
  
  <rect x="360" y="20" width="150" height="40" class="node" stroke="#192437" stroke-width="2"/>
  <text x="435" y="45" class="label" text-anchor="middle">Equipo lo tiene</text>
  
  <path d="M 435,60 L 435,100" class="arrow" marker-end="url(#arrowhead)"/>
  
  <rect x="360" y="110" width="150" height="40" class="node"/>
  <text x="435" y="135" class="label" text-anchor="middle">Equipo se disuelve</text>
  
  <path d="M 435,150 L 435,190" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 70,60 L 70,190" class="arrow-dashed" marker-end="url(#arrowhead-gray)"/>
  
  <rect x="20" y="200" width="160" height="40" class="node" stroke="#eb2141"/>
  <text x="100" y="218" class="label" text-anchor="middle">Jugador sigue existiendo</text>
  <text x="100" y="233" class="label-small" text-anchor="middle">(puede ir a otro equipo)</text>
  
  <path d="M 360,220 L 190,220" class="arrow" marker-end="url(#arrowhead)"/>
  
  <rect x="360" y="200" width="160" height="40" class="node" stroke="#eb2141"/>
  <text x="440" y="218" class="label" text-anchor="middle">Jugador sigue existiendo</text>
  <text x="440" y="233" class="label-small" text-anchor="middle">(puede ir a otro equipo)</text>
</svg>
