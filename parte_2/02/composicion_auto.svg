<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @font-face { font-family: 'Lato'; font-weight: 700; src: local('Arial'); }
    .label-bold { font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700; fill: #192437; }
    .label { font-family: 'Lato', sans-serif; font-size: 12px; fill: #404040; }
    .node { fill: #ffffff; stroke: #404040; stroke-width: 2; }
    .line { stroke: #404040; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="diamond" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto">
      <path d="M 0,6 L 6,12 L 12,6 L 6,0 Z" fill="#404040"/>
    </marker>
  </defs>
  
  <rect x="20" y="80" width="100" height="40" class="node"/>
  <text x="70" y="105" class="label-bold" text-anchor="middle">Auto</text>
  
  <!-- Connections -->
  <path d="M 120,100 L 250,50" class="line" marker-start="url(#diamond)"/>
  <path d="M 120,100 L 250,100" class="line" marker-start="url(#diamond)"/>
  <path d="M 120,100 L 250,150" class="line" marker-start="url(#diamond)"/>
  
  <rect x="250" y="30" width="100" height="40" class="node"/>
  <text x="300" y="55" class="label-bold" text-anchor="middle">Motor</text>
  
  <rect x="250" y="80" width="100" height="40" class="node"/>
  <text x="300" y="105" class="label-bold" text-anchor="middle">Carroceria</text>
  
  <rect x="250" y="130" width="100" height="40" class="node"/>
  <text x="300" y="155" class="label-bold" text-anchor="middle">Rueda</text>
  <text x="235" y="145" class="label">4</text>
</svg>
