<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css"><![CDATA[
/**
 * SVG Diagrams Stylesheet
 * Universidad Nacional de Río Negro - Ingeniería en Computación
 * 
 * Paleta de colores basada en identidad institucional UNRN
 * Colores primarios: #eb2141 (rojo institucional), #192437 (azul oscuro)
 */

/* Tipografías */
@font-face {
  font-family: 'Fabrikat';
  src: url('./Fabrikat_Regular.otf') format('opentype');
  font-weight: 400;
  font-style: normal;
}
@font-face {
  font-family: 'Fabrikat';
  src: url('./Fabrikat_Bold.otf') format('opentype');
  font-weight: 700;
  font-style: normal;
}
@font-face {
  font-family: 'Fabrikat';
  src: url('./Fabrikat_Medium.otf') format('opentype');
  font-weight: 500;
  font-style: normal;
}
@font-face {
  font-family: 'Lato';
  src: url('./LatoWeb-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
}
@font-face {
  font-family: 'Lato';
  src: url('./LatoWeb-Bold.ttf') format('truetype');
  font-weight: 700;
  font-style: normal;
}
@font-face {
  font-family: 'Share Tech Mono';
  src: url('./ShareTechMono-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
}

:root {
  --unrn-red: #eb2141;
  --unrn-dark-blue: #192437;
  --red-darker: #c71935;
  --red-dark: #d91d3a;
  --red-light: #ef4d68;
  --red-lighter: #f5798d;
  --red-lightest: #fce8ec;
  --blue-darker: #0d1219;
  --blue-dark: #141b2a;
  --blue-light: #2d3a50;
  --blue-lighter: #4a5a75;
  --blue-lightest: #e8ebf0;
  --gray-50: #fafafa;
  --gray-100: #f5f5f5;
  --gray-200: #e5e5e5;
  --gray-300: #d4d4d4;
  --gray-400: #a3a3a3;
  --gray-500: #737373;
  --gray-600: #525252;
  --gray-700: #404040;
  --gray-800: #262626;
  --gray-900: #171717;
  --stack-primary: #eb2141;
  --stack-secondary: #ff6b6b;
  --stack-data: #ffe0e0;
  --stack-pointer: #ffc9c9;
  --queue-primary: #2e7d32;
  --queue-secondary: #4caf50;
  --queue-data: #c8e6c9;
  --queue-pointer: #a5d6a7;
  --deque-primary: #6a1b9a;
  --deque-secondary: #8e24aa;
  --deque-data: #e1bee7;
  --deque-pointer: #ce93d8;
  --list-primary: #1565c0;
  --list-secondary: #1976d2;
  --list-data: #bbdefb;
  --list-pointer: #90caf9;
  --tree-primary: #558b2f;
  --tree-secondary: #689f38;
  --tree-data: #dcedc8;
  --tree-pointer: #c5e1a5;
  --graph-primary: #e65100;
  --graph-secondary: #f57c00;
  --graph-data: #ffe0b2;
  --graph-pointer: #ffcc80;
  --hash-primary: #283593;
  --hash-secondary: #3949ab;
  --hash-data: #c5cae9;
  --hash-pointer: #9fa8da;
}

.title { font-family: 'Fabrikat', Arial, sans-serif; font-size: 16px; font-weight: 700; fill: var(--unrn-dark-blue); text-anchor: middle; }
.subtitle { font-family: 'Fabrikat', Arial, sans-serif; font-size: 14px; font-weight: 500; fill: var(--blue-light); text-anchor: middle; }
.label { font-family: 'Lato', Arial, sans-serif; font-size: 12px; font-weight: 400; fill: var(--gray-700); }
.label-bold { font-family: 'Lato', Arial, sans-serif; font-size: 12px; font-weight: 700; fill: var(--unrn-dark-blue); }
.label-small { font-family: 'Lato', Arial, sans-serif; font-size: 10px; font-weight: 400; fill: var(--gray-600); }
.index { font-family: 'Lato', Arial, sans-serif; font-size: 10px; font-weight: 400; fill: var(--gray-500); }
.code { font-family: 'Share Tech Mono', 'Courier New', monospace; font-size: 11px; font-weight: 400; fill: var(--gray-700); }
.code-comment { font-family: 'Share Tech Mono', 'Courier New', monospace; font-size: 10px; font-weight: 400; fill: var(--gray-500); font-style: italic; }
.code-keyword { font-family: 'Share Tech Mono', 'Courier New', monospace; font-size: 11px; font-weight: 700; fill: var(--unrn-red); }
.node { fill: #ffffff; stroke: var(--gray-700); stroke-width: 2; }
.node-header { fill: var(--gray-100); stroke: var(--gray-700); stroke-width: 1; }
.node-data { fill: var(--blue-lightest); stroke: var(--gray-400); stroke-width: 1.5; }
.node-pointer { fill: #ffccbc; stroke: var(--gray-400); stroke-width: 1.5; }
.node-null { fill: var(--gray-200); stroke: var(--gray-500); stroke-width: 1.5; stroke-dasharray: 3,3; }
.node-highlight { fill: #fff3e0; stroke: var(--unrn-red); stroke-width: 2.5; }
.stack-node { fill: #ffffff; stroke: var(--stack-primary); stroke-width: 2; }
.stack-data { fill: var(--stack-data); stroke: var(--gray-400); stroke-width: 1.5; }
.stack-pointer { fill: var(--stack-pointer); stroke: var(--gray-400); stroke-width: 1.5; }
.stack-arrow { fill: none; stroke: var(--stack-primary); stroke-width: 2; }
.stack-label { fill: var(--stack-primary); font-weight: 700; }
.queue-node { fill: #ffffff; stroke: var(--queue-primary); stroke-width: 2; }
.queue-data { fill: var(--queue-data); stroke: var(--gray-400); stroke-width: 1.5; }
.queue-pointer { fill: var(--queue-pointer); stroke: var(--gray-400); stroke-width: 1.5; }
.queue-arrow { fill: none; stroke: var(--queue-primary); stroke-width: 2; }
.queue-label { fill: var(--queue-primary); font-weight: 700; }
.deque-node { fill: #ffffff; stroke: var(--deque-primary); stroke-width: 2; }
.deque-data { fill: var(--deque-data); stroke: var(--gray-400); stroke-width: 1.5; }
.deque-pointer { fill: var(--deque-pointer); stroke: var(--gray-400); stroke-width: 1.5; }
.deque-arrow { fill: none; stroke: var(--deque-primary); stroke-width: 2; }
.deque-arrow-secondary { fill: none; stroke: var(--deque-secondary); stroke-width: 2; }
.deque-label { fill: var(--deque-primary); font-weight: 700; }
.list-node { fill: #ffffff; stroke: var(--list-primary); stroke-width: 2; }
.list-data { fill: var(--list-data); stroke: var(--gray-400); stroke-width: 1.5; }
.list-pointer { fill: var(--list-pointer); stroke: var(--gray-400); stroke-width: 1.5; }
.list-arrow { fill: none; stroke: var(--list-primary); stroke-width: 2; }
.list-label { fill: var(--list-primary); font-weight: 700; }
.tree-node { fill: #ffffff; stroke: var(--tree-primary); stroke-width: 2; }
.tree-data { fill: var(--tree-data); stroke: var(--gray-400); stroke-width: 1.5; }
.tree-pointer { fill: var(--tree-pointer); stroke: var(--gray-400); stroke-width: 1.5; }
.tree-arrow { fill: none; stroke: var(--tree-primary); stroke-width: 2; }
.tree-label { fill: var(--tree-primary); font-weight: 700; }
.graph-node { fill: #ffffff; stroke: var(--graph-primary); stroke-width: 2; }
.graph-data { fill: var(--graph-data); stroke: var(--gray-400); stroke-width: 1.5; }
.graph-edge { fill: none; stroke: var(--graph-primary); stroke-width: 2; }
.graph-label { fill: var(--graph-primary); font-weight: 700; }
.hash-node { fill: #ffffff; stroke: var(--hash-primary); stroke-width: 2; }
.hash-data { fill: var(--hash-data); stroke: var(--gray-400); stroke-width: 1.5; }
.hash-pointer { fill: var(--hash-pointer); stroke: var(--gray-400); stroke-width: 1.5; }
.hash-arrow { fill: none; stroke: var(--hash-primary); stroke-width: 2; }
.hash-label { fill: var(--hash-primary); font-weight: 700; }
.arrow { fill: none; stroke: var(--gray-700); stroke-width: 2; marker-end: url(#arrowhead); }
.arrow-primary { fill: none; stroke: var(--unrn-red); stroke-width: 2; marker-end: url(#arrowhead-primary); }
.arrow-secondary { fill: none; stroke: var(--unrn-dark-blue); stroke-width: 2; marker-end: url(#arrowhead-secondary); }
.arrow-dashed { fill: none; stroke: var(--gray-500); stroke-width: 2; stroke-dasharray: 5,5; marker-end: url(#arrowhead-dashed); }
.arrow-bidirectional { fill: none; stroke: var(--gray-700); stroke-width: 2; marker-start: url(#arrowhead); marker-end: url(#arrowhead); }
.background { fill: #ffffff; }
.code-block { fill: var(--gray-100); stroke: var(--gray-300); stroke-width: 1; rx: 3; }
.highlight-box { fill: var(--red-lightest); stroke: var(--unrn-red); stroke-width: 1; rx: 3; }
.info-box { fill: var(--blue-lightest); stroke: var(--blue-light); stroke-width: 1; rx: 3; }
.memory-cell { fill: #ffffff; stroke: var(--gray-600); stroke-width: 1.5; }
.memory-cell-filled { fill: var(--blue-lightest); stroke: var(--gray-600); stroke-width: 1.5; }
.memory-cell-empty { fill: var(--gray-50); stroke: var(--gray-400); stroke-width: 1.5; stroke-dasharray: 3,3; }
.divider { stroke: var(--gray-300); stroke-width: 1; }
.divider-bold { stroke: var(--gray-600); stroke-width: 2; }
.badge { fill: var(--unrn-red); stroke: none; }
.badge-text { font-family: 'Lato', Arial, sans-serif; font-size: 10px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
.valid { stroke: #2e7d32; stroke-width: 2.5; }
.invalid { stroke: var(--unrn-red); stroke-width: 2.5; }
.warning { stroke: #f57c00; stroke-width: 2.5; }
.text-center { text-anchor: middle; }
.text-start { text-anchor: start; }
.text-end { text-anchor: end; }
    ]]></style>
    <!-- Marcadores de flechas -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="var(--unrn-red)"/>
    </marker>
    <marker id="arrowhead-queue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="var(--queue-primary)"/>
    </marker>
  </defs>
  
  <!-- Título principal -->
  <text x="400" y="30" class="title">Ejemplo de Uso del CSS Compartido</text>
  <text x="400" y="50" class="subtitle">Paleta de colores institucional UNRN</text>
  
  <!-- Sección 1: Pila -->
  <text x="150" y="90" class="label-bold">PILA (Stack)</text>
  
  <!-- Estructura de pila -->
  <rect x="50" y="100" width="120" height="70" class="stack-node"/>
  <text x="110" y="120" class="label-bold">pila_t</text>
  <line x1="50" y1="130" x2="170" y2="130" class="divider"/>
  <text x="70" y="145" class="label-small">tope:</text>
  <rect x="115" y="137" width="45" height="15" class="stack-pointer"/>
  <text x="70" y="163" class="label-small">tamanio:</text>
  <text x="137" y="163" class="label">3</text>
  
  <!-- Flecha -->
  <path d="M 155,152 L 200,152" class="stack-arrow" marker-end="url(#arrowhead)"/>
  
  <!-- Nodos de la pila -->
  <rect x="210" y="100" width="80" height="50" class="stack-node"/>
  <text x="250" y="115" class="label-bold">Nodo</text>
  <line x1="210" y1="125" x2="290" y2="125" class="divider"/>
  <rect x="220" y="130" width="60" height="15" class="stack-data"/>
  <text x="250" y="142" class="label">42</text>
  
  <rect x="310" y="100" width="80" height="50" class="stack-node"/>
  <text x="350" y="115" class="label-bold">Nodo</text>
  <line x1="310" y1="125" x2="390" y2="125" class="divider"/>
  <rect x="320" y="130" width="60" height="15" class="stack-data"/>
  <text x="350" y="142" class="label">17</text>
  
  <text x="420" y="130" class="stack-label">← TOPE</text>
  
  <!-- Sección 2: Cola -->
  <text x="550" y="90" class="label-bold">COLA (Queue)</text>
  
  <!-- Estructura de cola -->
  <rect x="450" y="100" width="120" height="80" class="queue-node"/>
  <text x="510" y="120" class="label-bold">cola_t</text>
  <line x1="450" y1="130" x2="570" y2="130" class="divider"/>
  <text x="470" y="145" class="label-small">frente:</text>
  <rect x="520" y="137" width="40" height="15" class="queue-pointer"/>
  <text x="470" y="163" class="label-small">final:</text>
  <rect x="520" y="155" width="40" height="15" class="queue-pointer"/>
  <text x="470" y="177" class="label-small">tamanio:</text>
  <text x="540" y="177" class="label">2</text>
  
  <!-- Flecha -->
  <path d="M 560,145 L 610,120" class="queue-arrow" marker-end="url(#arrowhead-queue)"/>
  
  <!-- Nodos de la cola -->
  <rect x="620" y="100" width="80" height="50" class="queue-node"/>
  <text x="660" y="115" class="label-bold">Nodo</text>
  <line x1="620" y1="125" x2="700" y2="125" class="divider"/>
  <rect x="630" y="130" width="60" height="15" class="queue-data"/>
  <text x="660" y="142" class="label">99</text>
  
  <text x="720" y="125" class="queue-label">← FRENTE</text>
  
  <!-- Sección 3: Código -->
  <rect x="50" y="220" width="700" height="140" class="code-block"/>
  <text x="60" y="245" class="label-bold">Ejemplo de código con estilos:</text>
  
  <text x="60" y="270" class="code">// Creación de una pila</text>
  <text x="60" y="290" class="code"><tspan class="code-keyword">pila_t</tspan> *pila = crear_pila();</text>
  <text x="60" y="310" class="code">apilar(pila, 42);</text>
  <text x="60" y="330" class="code">apilar(pila, 17);</text>
  <text x="60" y="350" class="code">destruir_pila(pila);</text>
  
  <!-- Sección 4: Paleta de colores -->
  <text x="50" y="400" class="label-bold">Paleta de colores por estructura:</text>
  
  <!-- Pilas -->
  <rect x="50" y="410" width="60" height="30" class="stack-data"/>
  <text x="80" y="430" class="label-small">Pilas</text>
  
  <!-- Colas -->
  <rect x="130" y="410" width="60" height="30" class="queue-data"/>
  <text x="160" y="430" class="label-small">Colas</text>
  
  <!-- Deques -->
  <rect x="210" y="410" width="60" height="30" class="deque-data"/>
  <text x="240" y="430" class="label-small">Deques</text>
  
  <!-- Listas -->
  <rect x="290" y="410" width="60" height="30" class="list-data"/>
  <text x="320" y="430" class="label-small">Listas</text>
  
  <!-- Árboles -->
  <rect x="370" y="410" width="60" height="30" class="tree-data"/>
  <text x="400" y="430" class="label-small">Árboles</text>
  
  <!-- Grafos -->
  <rect x="450" y="410" width="60" height="30" class="graph-data"/>
  <text x="480" y="430" class="label-small">Grafos</text>
  
  <!-- Hash -->
  <rect x="530" y="410" width="60" height="30" class="hash-data"/>
  <text x="560" y="430" class="label-small">Hash</text>
  
  <!-- Sección 5: Estados -->
  <text x="50" y="480" class="label-bold">Estados de validación:</text>
  
  <rect x="50" y="490" width="80" height="40" class="node valid"/>
  <text x="90" y="515" class="label">Válido</text>
  
  <rect x="150" y="490" width="80" height="40" class="node invalid"/>
  <text x="190" y="515" class="label">Inválido</text>
  
  <rect x="250" y="490" width="80" height="40" class="node warning"/>
  <text x="290" y="515" class="label">Advertencia</text>
  
  <!-- Footer -->
  <text x="400" y="570" class="label-small" text-anchor="middle">
    Universidad Nacional de Río Negro - Ingeniería en Computación
  </text>
  <text x="400" y="585" class="label-small" text-anchor="middle">
    CSS compartido para diagramas SVG - Programación 1
  </text>
</svg>
