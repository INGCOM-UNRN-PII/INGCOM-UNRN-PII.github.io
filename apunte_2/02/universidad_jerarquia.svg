<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    @font-face { font-family: 'Lato'; font-weight: 700; src: local('Arial'); }
    .label-bold { font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700; fill: #192437; }
    .label { font-family: 'Lato', sans-serif; font-size: 11px; fill: #404040; }
    .node { fill: #ffffff; stroke: #404040; stroke-width: 1.5; }
    .line { stroke: #404040; stroke-width: 1.2; fill: none; }
  </style>
  <defs>
    <marker id="diamond" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M 0,5 L 5,10 L 10,5 L 5,0 Z" fill="#404040"/>
    </marker>
    <marker id="open-diamond" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M 0,5 L 5,10 L 10,5 L 5,0 Z" fill="#ffffff" stroke="#404040" stroke-width="1"/>
    </marker>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#404040"/>
    </marker>
  </defs>
  
  <!-- Universidad -->
  <rect x="200" y="20" width="120" height="35" class="node"/>
  <text x="260" y="42" class="label-bold" text-anchor="middle">Universidad</text>
  
  <!-- Universidad -> Facultad -->
  <path d="M 260,55 L 260,90" class="line" marker-start="url(#diamond)"/>
  <text x="270" y="80" class="label">*</text>
  
  <!-- Facultad -->
  <rect x="200" y="90" width="120" height="35" class="node"/>
  <text x="260" y="112" class="label-bold" text-anchor="middle">Facultad</text>
  
  <!-- Facultad -> Departamento & Carrera -->
  <path d="M 200,107 L 120,107 L 120,160" class="line" marker-start="url(#diamond)"/>
  <path d="M 320,107 L 400,107 L 400,160" class="line" marker-start="url(#diamond)"/>
  
  <!-- Departamento -->
  <rect x="60" y="160" width="120" height="35" class="node"/>
  <text x="120" y="182" class="label-bold" text-anchor="middle">Departamento</text>
  
  <!-- Carrera -->
  <rect x="340" y="160" width="120" height="35" class="node"/>
  <text x="400" y="182" class="label-bold" text-anchor="middle">Carrera</text>
  
  <!-- Departamento -> Profesor -->
  <path d="M 120,195 L 120,240" class="line" marker-start="url(#open-diamond)"/>
  
  <!-- Profesor -->
  <rect x="60" y="240" width="120" height="35" class="node"/>
  <text x="120" y="262" class="label-bold" text-anchor="middle">Profesor</text>
  
  <!-- Carrera -> Materia -->
  <path d="M 400,195 L 400,240" class="line" marker-start="url(#diamond)"/>
  
  <!-- Materia -->
  <rect x="340" y="240" width="120" height="35" class="node"/>
  <text x="400" y="262" class="label-bold" text-anchor="middle">Materia</text>
  
  <!-- Profesor -> Materia (dicta) -->
  <path d="M 180,257 L 340,257" class="line" marker-end="url(#arrowhead)"/>
  <text x="260" y="250" class="label" text-anchor="middle">dicta</text>
  
  <!-- Carrera -> Estudiante (cursa) -->
  <path d="M 400,275 L 400,320" class="line"/>
  <text x="410" y="300" class="label">cursa</text>
  
  <!-- Estudiante -->
  <rect x="340" y="320" width="120" height="35" class="node"/>
  <text x="400" y="342" class="label-bold" text-anchor="middle">Estudiante</text>
</svg>
