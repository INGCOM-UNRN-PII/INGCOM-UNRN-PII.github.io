<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @font-face { font-family: 'Lato'; font-weight: 400; src: local('Arial'); }
    .label { font-family: 'Lato', sans-serif; font-size: 12px; fill: #404040; }
    .node { fill: #f5f5f5; stroke: #404040; stroke-width: 1.5; rx: 3; }
    .arrow { fill: none; stroke: #eb2141; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#eb2141"/>
    </marker>
  </defs>
  
  <rect x="20" y="20" width="100" height="40" class="node"/>
  <text x="70" y="45" class="label" text-anchor="middle">Crear factura</text>
  
  <path d="M 120,40 L 170,40" class="arrow" marker-end="url(#arrowhead)"/>
  
  <rect x="180" y="20" width="120" height="40" class="node"/>
  <text x="240" y="45" class="label" text-anchor="middle">Agregar líneas</text>
  
  <path d="M 300,40 L 350,40" class="arrow" marker-end="url(#arrowhead)"/>
  
  <rect x="360" y="20" width="180" height="40" class="node" stroke="#192437" stroke-width="2"/>
  <text x="450" y="45" class="label" text-anchor="middle">Factura con líneas</text>
  
  <path d="M 450,60 L 450,90" class="arrow" marker-end="url(#arrowhead)"/>
  
  <rect x="360" y="100" width="180" height="40" class="node"/>
  <text x="450" y="125" class="label" text-anchor="middle">Eliminar factura</text>
  
  <path d="M 450,140 L 450,170" class="arrow" marker-end="url(#arrowhead)"/>
  
  <rect x="340" y="170" width="220" height="25" fill="none" stroke="none"/>
  <text x="450" y="185" class="label" text-anchor="middle" font-weight="bold">Las líneas se eliminan automáticamente</text>
</svg>
