<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      :root {
        --unrn-red: #eb2141;
        --unrn-dark-blue: #192437;
        --gray-700: #404040;
        --blue-lightest: #e8ebf0;
      }
      .label { font-family: 'Lato', sans-serif; font-size: 13px; fill: var(--gray-700); }
      .label-bold { font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700; fill: var(--unrn-dark-blue); text-anchor: middle; }
      .node { fill: #ffffff; stroke: var(--unrn-dark-blue); stroke-width: 2; }
      .line { fill: none; stroke: var(--unrn-red); stroke-width: 2; }
      .composition-diamond { fill: var(--unrn-red); stroke: var(--unrn-red); stroke-width: 1; }
      .divider { stroke: var(--unrn-dark-blue); stroke-width: 1; }
      .title { font-family: 'Fabrikat', sans-serif; font-size: 14px; font-weight: 700; fill: var(--unrn-red); text-anchor: middle; }
    </style>
  </defs>

  <rect width="600" height="250" fill="#ffffff"/>
  
  <text x="300" y="30" class="title">♦ Composición</text>

  <!-- Auto -->
  <rect x="50" y="50" width="180" height="150" rx="3" class="node"/>
  <text x="140" y="75" class="label-bold">Auto</text>
  <line x1="50" y1="85" x2="230" y2="85" class="divider"/>
  <text x="60" y="105" class="label">- modelo: String</text>
  <text x="60" y="125" class="label">- año: int</text>
  <line x1="50" y1="135" x2="230" y2="135" class="divider"/>
  <text x="60" y="155" class="label">+ arrancar()</text>

  <!-- Composition Diamond and Line -->
  <line x1="230" y1="125" x2="370" y2="125" class="line"/>
  <polygon points="230,125 242,118 254,125 242,132" class="composition-diamond"/>

  <!-- Motor -->
  <rect x="370" y="50" width="180" height="150" rx="3" class="node"/>
  <text x="460" y="75" class="label-bold">Motor</text>
  <line x1="370" y1="85" x2="550" y2="85" class="divider"/>
  <text x="380" y="105" class="label">- cilindros: int</text>
  <text x="380" y="125" class="label">- potencia: int</text>
  <line x1="370" y1="135" x2="550" y2="135" class="divider"/>
  <text x="380" y="155" class="label">+ encender()</text>

</svg>
