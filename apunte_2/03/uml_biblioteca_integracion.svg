<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="280" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      :root {
        --unrn-red: #eb2141;
        --unrn-dark-blue: #192437;
        --gray-700: #404040;
      }
      .label { font-family: 'Lato', sans-serif; font-size: 11px; fill: var(--gray-700); }
      .label-bold { font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700; fill: var(--unrn-dark-blue); text-anchor: middle; }
      .node { fill: #ffffff; stroke: var(--unrn-dark-blue); stroke-width: 1.5; }
      .line { fill: none; stroke: var(--unrn-dark-blue); stroke-width: 1.5; }
      .composition-diamond { fill: var(--unrn-dark-blue); stroke: var(--unrn-dark-blue); }
      .aggregation-diamond { fill: #ffffff; stroke: var(--unrn-dark-blue); }
      .divider { stroke: var(--unrn-dark-blue); stroke-width: 1; }
    </style>
  </defs>

  <rect width="800" height="280" fill="#ffffff"/>

  <!-- Estantería -->
  <rect x="30" y="40" width="160" height="180" rx="2" class="node"/>
  <text x="110" y="60" class="label-bold">Estantería</text>
  <line x1="30" y1="70" x2="190" y2="70" class="divider"/>
  <text x="40" y="90" class="label">- numero: int</text>
  <text x="40" y="105" class="label">- seccion: String</text>
  <line x1="30" y1="115" x2="190" y2="115" class="divider"/>
  <text x="40" y="135" class="label">+ agregarLibro()</text>
  <text x="40" y="150" class="label">+ listarLibros()</text>
  <text x="40" y="165" class="label">+ buscarPorTitulo()</text>

  <!-- Composition Line -->
  <line x1="190" y1="110" x2="310" y2="110" class="line"/>
  <polygon points="190,110 200,105 210,110 200,115" class="composition-diamond"/>
  <text x="215" y="105" class="label">1</text>
  <text x="295" y="105" class="label">*</text>

  <!-- Libro -->
  <rect x="310" y="40" width="160" height="180" rx="2" class="node"/>
  <text x="390" y="60" class="label-bold">Libro</text>
  <line x1="310" y1="70" x2="470" y2="70" class="divider"/>
  <text x="320" y="90" class="label">- isbn: String</text>
  <text x="320" y="105" class="label">- titulo: String</text>
  <text x="320" y="120" class="label">- autor: String</text>
  <text x="320" y="135" class="label">- disponible: boolean</text>
  <line x1="310" y1="145" x2="470" y2="145" class="divider"/>
  <text x="320" y="165" class="label">+ prestar()</text>
  <text x="320" y="180" class="label">+ devolver()</text>

  <!-- Aggregation Line -->
  <line x1="470" y1="110" x2="590" y2="110" class="line"/>
  <polygon points="590,110 580,105 570,110 580,115" class="aggregation-diamond"/>
  <text x="480" y="105" class="label">*</text>
  <text x="560" y="105" class="label">*</text>

  <!-- Socio -->
  <rect x="590" y="40" width="160" height="180" rx="2" class="node"/>
  <text x="670" y="60" class="label-bold">Socio</text>
  <line x1="590" y1="70" x2="750" y2="70" class="divider"/>
  <text x="600" y="90" class="label">- numero: int</text>
  <text x="600" y="105" class="label">- nombre: String</text>
  <text x="600" y="120" class="label">- email: String</text>
  <line x1="590" y1="130" x2="750" y2="130" class="divider"/>
  <text x="600" y="150" class="label">+ tomarPrestado()</text>
  <text x="600" y="165" class="label">+ devolverLibro()</text>

</svg>
