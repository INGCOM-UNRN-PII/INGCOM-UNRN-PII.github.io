<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="600" height="150" viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      :root {
        --unrn-red: #eb2141;
        --unrn-dark-blue: #192437;
        --gray-700: #404040;
      }
      .label { font-family: 'Lato', sans-serif; font-size: 14px; fill: var(--gray-700); text-anchor: middle; }
      .label-bold { font-family: 'Lato', sans-serif; font-size: 16px; font-weight: 700; fill: var(--unrn-dark-blue); text-anchor: middle; }
      .node { fill: #ffffff; stroke: var(--unrn-dark-blue); stroke-width: 2; }
      .line { fill: none; stroke: var(--unrn-red); stroke-width: 2; }
    </style>
  </defs>

  <rect width="600" height="150" fill="#ffffff"/>

  <!-- Persona -->
  <rect x="50" y="40" width="160" height="70" rx="3" class="node"/>
  <text x="130" y="80" class="label-bold">Persona</text>

  <!-- Association Line -->
  <line x1="210" y1="75" x2="390" y2="75" class="line"/>
  
  <!-- Multiplicities -->
  <text x="230" y="70" class="label">1</text>
  <text x="370" y="70" class="label" style="font-size: 18px;">*</text>

  <!-- Libro -->
  <rect x="390" y="40" width="160" height="70" rx="3" class="node"/>
  <text x="470" y="80" class="label-bold">Libro</text>

</svg>
