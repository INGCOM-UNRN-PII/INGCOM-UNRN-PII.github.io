<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="650" height="350" viewBox="0 0 650 350" xmlns="http://www.w3.org/2000/svg">
<style>
  :root {
    --unrn-red: #eb2141;
    --unrn-dark-blue: #192437;
    --blue-light: #2d3a50;
    --blue-lightest: #e8ebf0;
    --gray-100: #f5f5f5;
    --gray-300: #d4d4d4;
    --gray-400: #a3a3a3;
    --gray-500: #737373;
    --gray-600: #525252;
    --gray-700: #404040;
    --red-lightest: #fce8ec;
  }
  .title { font-family: 'Fabrikat', Arial, sans-serif; font-size: 16px; font-weight: 700; fill: var(--unrn-dark-blue); text-anchor: middle; }
  .label { font-family: 'Lato', Arial, sans-serif; font-size: 12px; fill: var(--gray-700); }
  .label-bold { font-family: 'Lato', Arial, sans-serif; font-size: 12px; font-weight: 700; fill: var(--unrn-dark-blue); }
  .label-small { font-family: 'Lato', Arial, sans-serif; font-size: 10px; fill: var(--gray-600); }
  .code { font-family: 'Share Tech Mono', monospace; font-size: 11px; fill: var(--gray-700); }
  .code-comment { font-family: 'Share Tech Mono', monospace; font-size: 10px; fill: var(--gray-500); font-style: italic; }
  .node { fill: #ffffff; stroke: var(--gray-700); stroke-width: 2; }
  .node-data { fill: var(--blue-lightest); stroke: var(--gray-400); stroke-width: 1.5; }
  .node-highlight { fill: #fff3e0; stroke: var(--unrn-red); stroke-width: 2.5; }
  .info-box { fill: var(--blue-lightest); stroke: var(--blue-light); stroke-width: 1; rx: 3; }
  .code-block { fill: var(--gray-100); stroke: var(--gray-300); stroke-width: 1; rx: 3; }
  .highlight-box { fill: var(--red-lightest); stroke: var(--unrn-red); stroke-width: 1; rx: 3; }
  .memory-cell { fill: #ffffff; stroke: var(--gray-600); stroke-width: 1.5; }
  .arrow { fill: none; stroke: var(--gray-700); stroke-width: 2; }
  .divider { stroke: var(--gray-300); stroke-width: 1; }
  .divider-bold { stroke: var(--gray-600); stroke-width: 2; }
  .valid { stroke: #2e7d32; stroke-width: 2.5; }
  .invalid { stroke: var(--unrn-red); stroke-width: 2.5; }
  .divider-dashed { stroke: var(--gray-300); stroke-width: 1; stroke-dasharray: 4; }
</style>
  <text x="325" y="30" class="title">Estructurado vs. Orientado a Objetos</text>
  
  <!-- Paradigma Estructurado -->
  <text x="150" y="65" class="label-bold">Paradigma Estructurado</text>
  
  <rect x="50" y="80" width="200" height="100" class="info-box"/>
  <text x="150" y="100" class="label-bold">DATOS (struct)</text>
  <text x="70" y="125" class="code">struct Persona {</text>
  <text x="80" y="145" class="code">  nombre, edad;</text>
  <text x="70" y="165" class="code">}</text>
  
  <rect x="50" y="200" width="200" height="80" class="code-block"/>
  <text x="150" y="220" class="label-bold">FUNCIONES</text>
  <text x="70" y="245" class="code">saludar(p)</text>
  <text x="70" y="265" class="code">cumplirAnios(p)</text>
  
  <text x="150" y="310" class="label-small" fill="var(--unrn-red)">Separación de datos y código</text>
  
  <!-- Paradigma OO -->
  <text x="450" y="65" class="label-bold">Paradigma OO</text>
  
  <rect x="350" y="80" width="220" height="200" class="node"/>
  <text x="460" y="105" class="label-bold">OBJETO</text>
  
  <rect x="370" y="120" width="180" height="60" class="node-data"/>
  <text x="460" y="140" class="label-bold">DATOS</text>
  <text x="380" y="165" class="label-small">nombre, edad</text>
  
  <rect x="370" y="195" width="180" height="70" class="highlight-box"/>
  <text x="460" y="215" class="label-bold" fill="white">COMPORTAMIENTO</text>
  <text x="380" y="240" class="label-small" fill="white">saludar(), cumplirAnios()</text>
  
  <text x="460" y="310" class="label-small" fill="var(--unrn-red)">Unidad indivisible</text>
  <text x="460" y="330" class="label-small" fill="var(--unrn-red)">(Encapsulamiento)</text>
</svg>