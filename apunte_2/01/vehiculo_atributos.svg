<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="650" height="350" viewBox="0 0 650 350" xmlns="http://www.w3.org/2000/svg">
<style>
  :root {
    --unrn-red: #eb2141;
    --unrn-dark-blue: #192437;
    --blue-light: #2d3a50;
    --blue-lightest: #e8ebf0;
    --gray-100: #f5f5f5;
    --gray-300: #d4d4d4;
    --gray-400: #a3a3a3;
    --gray-500: #737373;
    --gray-600: #525252;
    --gray-700: #404040;
    --red-lightest: #fce8ec;
  }
  .title { font-family: 'Fabrikat', Arial, sans-serif; font-size: 16px; font-weight: 700; fill: var(--unrn-dark-blue); text-anchor: middle; }
  .label { font-family: 'Lato', Arial, sans-serif; font-size: 12px; fill: var(--gray-700); }
  .label-bold { font-family: 'Lato', Arial, sans-serif; font-size: 12px; font-weight: 700; fill: var(--unrn-dark-blue); }
  .label-small { font-family: 'Lato', Arial, sans-serif; font-size: 10px; fill: var(--gray-600); }
  .code { font-family: 'Share Tech Mono', monospace; font-size: 11px; fill: var(--gray-700); }
  .code-comment { font-family: 'Share Tech Mono', monospace; font-size: 10px; fill: var(--gray-500); font-style: italic; }
  .node { fill: #ffffff; stroke: var(--gray-700); stroke-width: 2; }
  .node-data { fill: var(--blue-lightest); stroke: var(--gray-400); stroke-width: 1.5; }
  .node-highlight { fill: #fff3e0; stroke: var(--unrn-red); stroke-width: 2.5; }
  .info-box { fill: var(--blue-lightest); stroke: var(--blue-light); stroke-width: 1; rx: 3; }
  .code-block { fill: var(--gray-100); stroke: var(--gray-300); stroke-width: 1; rx: 3; }
  .highlight-box { fill: var(--red-lightest); stroke: var(--unrn-red); stroke-width: 1; rx: 3; }
  .memory-cell { fill: #ffffff; stroke: var(--gray-600); stroke-width: 1.5; }
  .arrow { fill: none; stroke: var(--gray-700); stroke-width: 2; }
  .divider { stroke: var(--gray-300); stroke-width: 1; }
  .divider-bold { stroke: var(--gray-600); stroke-width: 2; }
  .valid { stroke: #2e7d32; stroke-width: 2.5; }
  .invalid { stroke: var(--unrn-red); stroke-width: 2.5; }
  .divider-dashed { stroke: var(--gray-300); stroke-width: 1; stroke-dasharray: 4; }
</style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="var(--unrn-red)"/>
    </marker>
  </defs>
  
  <text x="325" y="25" class="title">Clase e Instancias: Vehículo</text>
  
  <!-- Clase Vehículo -->
  <rect x="50" y="50" width="220" height="150" class="node"/>
  <rect x="50" y="50" width="220" height="30" class="node-highlight"/>
  <text x="160" y="70" class="label-bold" fill="white">Clase: Vehículo</text>
  <text x="60" y="100" class="label-small">patente (ID único)</text>
  <text x="60" y="120" class="label-small">marca (fabricante)</text>
  <text x="60" y="140" class="label-small">modelo (versión)</text>
  <text x="60" y="160" class="label-small">año de fabricación</text>
  <text x="60" y="180" class="label-small">kilometraje</text>
  
  <text x="160" y="220" class="label-bold">Instanciación</text>
  <path d="M 160,230 L 160,250 L 100,250 L 100,265" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 160,230 L 160,250 L 450,250 L 450,265" class="arrow" marker-end="url(#arrowhead)"/>
  
  <!-- Auto Juan -->
  <rect x="30" y="270" width="200" height="70" class="node-data"/>
  <text x="130" y="285" class="label-bold">Auto de Juan</text>
  <text x="40" y="305" class="label-small">patente: "ABC123", marca: "Ford"</text>
  <text x="40" y="325" class="label-small">modelo: "Fiesta", año: 2018, km: 45000</text>
  
  <!-- Auto María -->
  <rect x="350" y="270" width="200" height="70" class="node-data"/>
  <text x="450" y="285" class="label-bold">Auto de María</text>
  <text x="360" y="305" class="label-small">patente: "XYZ789", marca: "Toyota"</text>
  <text x="360" y="325" class="label-small">modelo: "Corolla", año: 2021, km: 12000</text>
</svg>