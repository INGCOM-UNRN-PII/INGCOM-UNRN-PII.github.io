<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
<style>
  :root {
    --unrn-red: #eb2141;
    --unrn-dark-blue: #192437;
    --blue-light: #2d3a50;
    --blue-lightest: #e8ebf0;
    --gray-100: #f5f5f5;
    --gray-300: #d4d4d4;
    --gray-400: #a3a3a3;
    --gray-500: #737373;
    --gray-600: #525252;
    --gray-700: #404040;
    --red-lightest: #fce8ec;
  }
  .title { font-family: 'Fabrikat', Arial, sans-serif; font-size: 16px; font-weight: 700; fill: var(--unrn-dark-blue); text-anchor: middle; }
  .label { font-family: 'Lato', Arial, sans-serif; font-size: 12px; fill: var(--gray-700); }
  .label-bold { font-family: 'Lato', Arial, sans-serif; font-size: 12px; font-weight: 700; fill: var(--unrn-dark-blue); }
  .label-small { font-family: 'Lato', Arial, sans-serif; font-size: 10px; fill: var(--gray-600); }
  .code { font-family: 'Share Tech Mono', monospace; font-size: 11px; fill: var(--gray-700); }
  .code-comment { font-family: 'Share Tech Mono', monospace; font-size: 10px; fill: var(--gray-500); font-style: italic; }
  .node { fill: #ffffff; stroke: var(--gray-700); stroke-width: 2; }
  .node-data { fill: var(--blue-lightest); stroke: var(--gray-400); stroke-width: 1.5; }
  .node-highlight { fill: #fff3e0; stroke: var(--unrn-red); stroke-width: 2.5; }
  .info-box { fill: var(--blue-lightest); stroke: var(--blue-light); stroke-width: 1; rx: 3; }
  .code-block { fill: var(--gray-100); stroke: var(--gray-300); stroke-width: 1; rx: 3; }
  .highlight-box { fill: var(--red-lightest); stroke: var(--unrn-red); stroke-width: 1; rx: 3; }
  .memory-cell { fill: #ffffff; stroke: var(--gray-600); stroke-width: 1.5; }
  .arrow { fill: none; stroke: var(--gray-700); stroke-width: 2; }
  .divider { stroke: var(--gray-300); stroke-width: 1; }
  .divider-bold { stroke: var(--gray-600); stroke-width: 2; }
  .valid { stroke: #2e7d32; stroke-width: 2.5; }
  .invalid { stroke: var(--unrn-red); stroke-width: 2.5; }
  .divider-dashed { stroke: var(--gray-300); stroke-width: 1; stroke-dasharray: 4; }
</style>
  <text x="300" y="30" class="title">Estructura de Clase: CuentaBancaria</text>
  
  <!-- Clase Central -->
  <rect x="50" y="60" width="500" height="220" class="node"/>
  <rect x="50" y="60" width="500" height="35" class="node-highlight"/>
  <text x="300" y="83" class="label-bold" fill="white">CuentaBancaria</text>
  
  <!-- Atributos -->
  <text x="70" y="115" class="label-bold">Atributos</text>
  <text x="80" y="135" class="label-small">numero</text>
  <text x="80" y="155" class="label-small">titular</text>
  <text x="80" y="175" class="label-small">saldo</text>
  
  <line x1="220" y1="100" x2="220" y2="280" class="divider"/>
  
  <!-- Métodos -->
  <text x="240" y="115" class="label-bold">Métodos de Consulta</text>
  <text x="250" y="135" class="code">obtenerSaldo()</text>
  <text x="450" y="135" class="label-small" fill="var(--unrn-dark-blue)">→ saldo actual</text>
  <text x="250" y="155" class="code">obtenerTitular()</text>
  <text x="450" y="155" class="label-small" fill="var(--unrn-dark-blue)">→ titular</text>
  
  <line x1="240" y1="185" x2="530" y2="185" class="divider-dashed"/>
  
  <text x="240" y="210" class="label-bold">Métodos de Modificación</text>
  <text x="250" y="230" class="code">depositar(monto)</text>
  <text x="450" y="230" class="label-small" fill="var(--unrn-red)">↑ aumenta saldo</text>
  <text x="250" y="250" class="code">extraer(monto)</text>
  <text x="450" y="250" class="label-small" fill="var(--unrn-red)">↓ disminuye saldo</text>
</svg>