<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="600" height="350" viewBox="0 0 600 350" xmlns="http://www.w3.org/2000/svg">
<style>
  :root {
    --unrn-red: #eb2141;
    --unrn-dark-blue: #192437;
    --blue-light: #2d3a50;
    --blue-lightest: #e8ebf0;
    --gray-100: #f5f5f5;
    --gray-300: #d4d4d4;
    --gray-400: #a3a3a3;
    --gray-500: #737373;
    --gray-600: #525252;
    --gray-700: #404040;
    --red-lightest: #fce8ec;
  }
  .title { font-family: 'Fabrikat', Arial, sans-serif; font-size: 16px; font-weight: 700; fill: var(--unrn-dark-blue); text-anchor: middle; }
  .label { font-family: 'Lato', Arial, sans-serif; font-size: 12px; fill: var(--gray-700); }
  .label-bold { font-family: 'Lato', Arial, sans-serif; font-size: 12px; font-weight: 700; fill: var(--unrn-dark-blue); }
  .label-small { font-family: 'Lato', Arial, sans-serif; font-size: 10px; fill: var(--gray-600); }
  .code { font-family: 'Share Tech Mono', monospace; font-size: 11px; fill: var(--gray-700); }
  .code-comment { font-family: 'Share Tech Mono', monospace; font-size: 10px; fill: var(--gray-500); font-style: italic; }
  .node { fill: #ffffff; stroke: var(--gray-700); stroke-width: 2; }
  .node-data { fill: var(--blue-lightest); stroke: var(--gray-400); stroke-width: 1.5; }
  .node-highlight { fill: #fff3e0; stroke: var(--unrn-red); stroke-width: 2.5; }
  .info-box { fill: var(--blue-lightest); stroke: var(--blue-light); stroke-width: 1; rx: 3; }
  .code-block { fill: var(--gray-100); stroke: var(--gray-300); stroke-width: 1; rx: 3; }
  .highlight-box { fill: var(--red-lightest); stroke: var(--unrn-red); stroke-width: 1; rx: 3; }
  .memory-cell { fill: #ffffff; stroke: var(--gray-600); stroke-width: 1.5; }
  .arrow { fill: none; stroke: var(--gray-700); stroke-width: 2; }
  .divider { stroke: var(--gray-300); stroke-width: 1; }
  .divider-bold { stroke: var(--gray-600); stroke-width: 2; }
  .valid { stroke: #2e7d32; stroke-width: 2.5; }
  .invalid { stroke: var(--unrn-red); stroke-width: 2.5; }
  .divider-dashed { stroke: var(--gray-300); stroke-width: 1; stroke-dasharray: 4; }
</style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#404040" />
    </marker>
  </defs>

  <!-- Interfaces -->
  <g transform="translate(20, 20)">
    <rect width="140" height="70" class="info-box" rx="3" />
    <text x="70" y="25" class="label-bold" text-anchor="middle">Trabajador</text>
    <line x1="0" y1="35" x2="140" y2="35" class="divider" />
    <text x="10" y="55" class="code">+ trabajar()</text>
  </g>

  <g transform="translate(230, 20)">
    <rect width="140" height="70" class="info-box" rx="3" />
    <text x="70" y="25" class="label-bold" text-anchor="middle">Programador</text>
    <line x1="0" y1="35" x2="140" y2="35" class="divider" />
    <text x="10" y="55" class="code">+ programar()</text>
  </g>

  <g transform="translate(440, 20)">
    <rect width="140" height="70" class="info-box" rx="3" />
    <text x="70" y="25" class="label-bold" text-anchor="middle">Conductor</text>
    <line x1="0" y1="35" x2="140" y2="35" class="divider" />
    <text x="10" y="55" class="code">+ conducir()</text>
  </g>

  <!-- Conexiones -->
  <path d="M120 180 L120 140 L280 140 L280 180" fill="none" stroke="#404040" stroke-width="2" stroke-dasharray="5,5" />
  <path d="M90 140 L90 90" class="arrow" marker-end="url(#arrowhead)" stroke-dasharray="5,5" />
  <path d="M300 140 L300 90" class="arrow" marker-end="url(#arrowhead)" stroke-dasharray="5,5" />
  
  <path d="M510 180 L510 90" class="arrow" marker-end="url(#arrowhead)" stroke-dasharray="5,5" />

  <!-- Clases -->
  <g transform="translate(40, 180)">
    <rect width="160" height="60" class="node" rx="3" />
    <text x="80" y="25" class="label-bold" text-anchor="middle">Desarrollador</text>
    <text x="80" y="45" class="label-small" text-anchor="middle">(impl. ambas)</text>
  </g>

  <g transform="translate(430, 180)">
    <rect width="160" height="60" class="node" rx="3" />
    <text x="80" y="25" class="label-bold" text-anchor="middle">Chofer</text>
    <text x="80" y="45" class="label-small" text-anchor="middle">(impl. Conductor)</text>
  </g>
</svg>
