<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
<style>
  :root {
    --unrn-red: #eb2141;
    --unrn-dark-blue: #192437;
    --blue-light: #2d3a50;
    --blue-lightest: #e8ebf0;
    --gray-100: #f5f5f5;
    --gray-300: #d4d4d4;
    --gray-400: #a3a3a3;
    --gray-500: #737373;
    --gray-600: #525252;
    --gray-700: #404040;
    --red-lightest: #fce8ec;
  }
  .title { font-family: 'Fabrikat', Arial, sans-serif; font-size: 16px; font-weight: 700; fill: var(--unrn-dark-blue); text-anchor: middle; }
  .label { font-family: 'Lato', Arial, sans-serif; font-size: 12px; fill: var(--gray-700); }
  .label-bold { font-family: 'Lato', Arial, sans-serif; font-size: 12px; font-weight: 700; fill: var(--unrn-dark-blue); }
  .label-small { font-family: 'Lato', Arial, sans-serif; font-size: 10px; fill: var(--gray-600); }
  .code { font-family: 'Share Tech Mono', monospace; font-size: 11px; fill: var(--gray-700); }
  .code-comment { font-family: 'Share Tech Mono', monospace; font-size: 10px; fill: var(--gray-500); font-style: italic; }
  .node { fill: #ffffff; stroke: var(--gray-700); stroke-width: 2; }
  .node-data { fill: var(--blue-lightest); stroke: var(--gray-400); stroke-width: 1.5; }
  .node-highlight { fill: #fff3e0; stroke: var(--unrn-red); stroke-width: 2.5; }
  .info-box { fill: var(--blue-lightest); stroke: var(--blue-light); stroke-width: 1; rx: 3; }
  .code-block { fill: var(--gray-100); stroke: var(--gray-300); stroke-width: 1; rx: 3; }
  .highlight-box { fill: var(--red-lightest); stroke: var(--unrn-red); stroke-width: 1; rx: 3; }
  .memory-cell { fill: #ffffff; stroke: var(--gray-600); stroke-width: 1.5; }
  .arrow { fill: none; stroke: var(--gray-700); stroke-width: 2; }
  .divider { stroke: var(--gray-300); stroke-width: 1; }
  .divider-bold { stroke: var(--gray-600); stroke-width: 2; }
  .valid { stroke: #2e7d32; stroke-width: 2.5; }
  .invalid { stroke: var(--unrn-red); stroke-width: 2.5; }
  .divider-dashed { stroke: var(--gray-300); stroke-width: 1; stroke-dasharray: 4; }
</style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#404040" />
    </marker>
  </defs>

  <!-- Root Interface -->
  <g transform="translate(300, 20)">
    <rect width="200" height="100" class="info-box" rx="3" />
    <text x="100" y="25" class="label-bold" text-anchor="middle">MedioPago</text>
    <text x="100" y="40" class="label-small" text-anchor="middle">«interface»</text>
    <line x1="0" y1="48" x2="200" y2="48" class="divider" />
    <text x="10" y="65" class="code">+ procesarPago(monto)</text>
    <text x="10" y="80" class="code">+ verificarFondos()</text>
    <text x="10" y="95" class="code">+ obtenerRecibo()</text>
  </g>

  <!-- Level 2: Tarjeta, Efectivo, Billetera -->
  <path d="M400 120 L400 160" stroke="#404040" stroke-width="2" fill="none" />
  <path d="M120 160 L680 160" stroke="#404040" stroke-width="2" fill="none" />
  
  <path d="M120 160 L120 180" class="arrow" marker-end="url(#arrowhead)" stroke-dasharray="5,5" />
  <path d="M400 160 L400 180" class="arrow" marker-end="url(#arrowhead)" stroke-dasharray="5,5" />
  <path d="M680 160 L680 180" class="arrow" marker-end="url(#arrowhead)" stroke-dasharray="5,5" />

  <!-- Tarjeta (abstract) -->
  <g transform="translate(40, 180)">
    <rect width="160" height="130" class="node" rx="3" />
    <text x="80" y="25" class="label-bold" text-anchor="middle">Tarjeta</text>
    <text x="80" y="40" class="label-small" text-anchor="middle">«abstract»</text>
    <line x1="0" y1="48" x2="160" y2="48" class="divider" />
    <text x="10" y="65" class="code">- numero</text>
    <text x="10" y="80" class="code">- titular</text>
    <line x1="0" y1="90" x2="160" y2="90" class="divider" />
    <text x="10" y="105" class="code">+ validar()</text>
  </g>

  <!-- Efectivo -->
  <g transform="translate(320, 180)">
    <rect width="160" height="100" class="node" rx="3" />
    <text x="80" y="25" class="label-bold" text-anchor="middle">Efectivo</text>
    <line x1="0" y1="35" x2="160" y2="35" class="divider" />
    <text x="10" y="55" class="code">+ procesarPago()</text>
    <text x="10" y="72" class="code">+ verificarFondos()</text>
  </g>

  <!-- Billetera (abstract) -->
  <g transform="translate(600, 180)">
    <rect width="160" height="110" class="node" rx="3" />
    <text x="80" y="25" class="label-bold" text-anchor="middle">Billetera</text>
    <text x="80" y="40" class="label-small" text-anchor="middle">«abstract»</text>
    <line x1="0" y1="48" x2="160" y2="48" class="divider" />
    <text x="10" y="65" class="code">- email</text>
    <text x="10" y="80" class="code">- saldo</text>
    <line x1="0" y1="90" x2="160" y2="90" class="divider" />
    <text x="10" y="105" class="code">+ recargar()</text>
  </g>

  <!-- Level 3: Credito, Debito -->
  <path d="M120 310 L120 350" stroke="#404040" stroke-width="2" fill="none" />
  <path d="M50 350 L190 350" stroke="#404040" stroke-width="2" fill="none" />
  <path d="M50 350 L50 370" class="arrow" marker-end="url(#arrowhead)" />
  <path d="M190 350 L190 370" class="arrow" marker-end="url(#arrowhead)" />

  <g transform="translate(10, 370)">
    <rect width="100" height="100" class="node" rx="3" />
    <text x="50" y="25" class="label-bold" text-anchor="middle">Credito</text>
    <line x1="0" y1="35" x2="100" y2="35" class="divider" />
    <text x="10" y="55" class="code">- limite</text>
    <line x1="0" y1="65" x2="100" y2="65" class="divider" />
    <text x="5" y="80" class="code-comment">procesarPago()</text>
  </g>

  <g transform="translate(140, 370)">
    <rect width="100" height="100" class="node" rx="3" />
    <text x="50" y="25" class="label-bold" text-anchor="middle">Debito</text>
    <line x1="0" y1="35" x2="100" y2="35" class="divider" />
    <text x="10" y="55" class="code">- cuenta</text>
    <line x1="0" y1="65" x2="100" y2="65" class="divider" />
    <text x="5" y="80" class="code-comment">procesarPago()</text>
  </g>

  <!-- Level 3: MercadoPago, PayPal -->
  <path d="M680 290 L680 330" stroke="#404040" stroke-width="2" fill="none" />
  <path d="M600 330 L760 330" stroke="#404040" stroke-width="2" fill="none" />
  <path d="M600 330 L600 350" class="arrow" marker-end="url(#arrowhead)" />
  <path d="M760 330 L760 350" class="arrow" marker-end="url(#arrowhead)" />

  <g transform="translate(540, 350)">
    <rect width="120" height="60" class="node" rx="3" />
    <text x="60" y="35" class="label-bold" text-anchor="middle">MercadoPago</text>
  </g>

  <g transform="translate(700, 350)">
    <rect width="100" height="60" class="node" rx="3" />
    <text x="50" y="35" class="label-bold" text-anchor="middle">PayPal</text>
  </g>
</svg>
