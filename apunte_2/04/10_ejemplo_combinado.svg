<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="600" height="450" viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
<style>
  :root {
    --unrn-red: #eb2141;
    --unrn-dark-blue: #192437;
    --blue-light: #2d3a50;
    --blue-lightest: #e8ebf0;
    --gray-100: #f5f5f5;
    --gray-300: #d4d4d4;
    --gray-400: #a3a3a3;
    --gray-500: #737373;
    --gray-600: #525252;
    --gray-700: #404040;
    --red-lightest: #fce8ec;
  }
  .title { font-family: 'Fabrikat', Arial, sans-serif; font-size: 16px; font-weight: 700; fill: var(--unrn-dark-blue); text-anchor: middle; }
  .label { font-family: 'Lato', Arial, sans-serif; font-size: 12px; fill: var(--gray-700); }
  .label-bold { font-family: 'Lato', Arial, sans-serif; font-size: 12px; font-weight: 700; fill: var(--unrn-dark-blue); }
  .label-small { font-family: 'Lato', Arial, sans-serif; font-size: 10px; fill: var(--gray-600); }
  .code { font-family: 'Share Tech Mono', monospace; font-size: 11px; fill: var(--gray-700); }
  .code-comment { font-family: 'Share Tech Mono', monospace; font-size: 10px; fill: var(--gray-500); font-style: italic; }
  .node { fill: #ffffff; stroke: var(--gray-700); stroke-width: 2; }
  .node-data { fill: var(--blue-lightest); stroke: var(--gray-400); stroke-width: 1.5; }
  .node-highlight { fill: #fff3e0; stroke: var(--unrn-red); stroke-width: 2.5; }
  .info-box { fill: var(--blue-lightest); stroke: var(--blue-light); stroke-width: 1; rx: 3; }
  .code-block { fill: var(--gray-100); stroke: var(--gray-300); stroke-width: 1; rx: 3; }
  .highlight-box { fill: var(--red-lightest); stroke: var(--unrn-red); stroke-width: 1; rx: 3; }
  .memory-cell { fill: #ffffff; stroke: var(--gray-600); stroke-width: 1.5; }
  .arrow { fill: none; stroke: var(--gray-700); stroke-width: 2; }
  .divider { stroke: var(--gray-300); stroke-width: 1; }
  .divider-bold { stroke: var(--gray-600); stroke-width: 2; }
  .valid { stroke: #2e7d32; stroke-width: 2.5; }
  .invalid { stroke: var(--unrn-red); stroke-width: 2.5; }
  .divider-dashed { stroke: var(--gray-300); stroke-width: 1; stroke-dasharray: 4; }
</style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#404040" />
    </marker>
  </defs>

  <!-- Interface -->
  <g transform="translate(240, 10)">
    <rect width="120" height="80" class="info-box" rx="3" />
    <text x="60" y="25" class="label-bold" text-anchor="middle">Reproducible</text>
    <text x="60" y="40" class="label-small" text-anchor="middle">«interface»</text>
    <line x1="0" y1="48" x2="120" y2="48" class="divider" />
    <text x="10" y="62" class="code">+ play(), pause()</text>
  </g>

  <!-- Abstract Multimedia -->
  <g transform="translate(100, 130)">
    <rect width="140" height="100" class="node" rx="3" />
    <text x="70" y="25" class="label-bold" text-anchor="middle">Multimedia</text>
    <text x="70" y="40" class="label-small" text-anchor="middle">«abstract»</text>
    <line x1="0" y1="48" x2="140" y2="48" class="divider" />
    <text x="10" y="65" class="code">- archivo</text>
    <line x1="0" y1="75" x2="140" y2="75" class="divider" />
    <text x="10" y="90" class="code">+ play(), pause()</text>
  </g>

  <!-- Radio -->
  <g transform="translate(360, 130)">
    <rect width="140" height="100" class="node" rx="3" />
    <text x="70" y="25" class="label-bold" text-anchor="middle">Radio</text>
    <line x1="0" y1="35" x2="140" y2="35" class="divider" />
    <text x="10" y="52" class="code">+ play(), pause()</text>
    <text x="10" y="67" class="code">+ sintonizar()</text>
  </g>

  <!-- Conexiones -->
  <path d="M170 130 L170 110 L430 110 L430 130" fill="none" stroke="#404040" stroke-width="2" stroke-dasharray="5,5" />
  <path d="M300 110 L300 90" class="arrow" marker-end="url(#arrowhead)" stroke-dasharray="5,5" />

  <!-- Subclases Multimedia -->
  <path d="M80 300 L80 270 L260 270 L260 300" fill="none" stroke="#404040" stroke-width="2" />
  <path d="M170 270 L170 230" class="arrow" marker-end="url(#arrowhead)" />

  <g transform="translate(30, 300)">
    <rect width="100" height="50" class="node" rx="3" />
    <text x="50" y="30" class="label-bold" text-anchor="middle">Audio</text>
  </g>
  <g transform="translate(210, 300)">
    <rect width="100" height="50" class="node" rx="3" />
    <text x="50" y="30" class="label-bold" text-anchor="middle">Video</text>
  </g>
</svg>
