<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<?xml-stylesheet href="../resources/svg.css" type="text/css"?>
<svg width="650" height="400" viewBox="0 0 650 400" xmlns="http://www.w3.org/2000/svg">
  <title>Conversión y Promoción de Tipos en Java</title>
  
  <!-- Título -->
  <text x="325" y="30" class="title">Conversión de Tipos (Casting)</text>
  
  <!-- Promoción Automática -->
  <g id="promocion">
    <text x="200" y="70" class="subtitle">Promoción Automática (Implícita)</text>
    
    <rect x="50" y="90" width="400" height="120" class="info-box"/>
    
    <!-- Flujo de promoción -->
    <rect x="70" y="110" width="60" height="35" class="stack-data"/>
    <text x="100" y="132" class="code">byte</text>
    
    <text x="140" y="127" class="code">→</text>
    
    <rect x="160" y="110" width="60" height="35" class="stack-data"/>
    <text x="190" y="132" class="code">short</text>
    
    <text x="230" y="127" class="code">→</text>
    
    <rect x="250" y="110" width="60" height="35" class="node-highlight"/>
    <text x="280" y="132" class="code">int</text>
    
    <text x="320" y="127" class="code">→</text>
    
    <rect x="340" y="110" width="60" height="35" class="stack-data"/>
    <text x="370" y="132" class="code">long</text>
    
    <!-- char branch -->
    <rect x="160" y="160" width="60" height="35" class="queue-data"/>
    <text x="190" y="182" class="code">char</text>
    
    <defs>
      <marker id="arrow-promo" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill="#2e7d32"/>
      </marker>
    </defs>
    <line x1="220" y1="177" x2="250" y2="145" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrow-promo)"/>
    
    <!-- float/double -->
    <text x="410" y="127" class="code">→</text>
    
    <rect x="70" y="160" width="60" height="35" class="list-data"/>
    <text x="100" y="182" class="code">float</text>
    <line x1="130" y1="177" x2="340" y2="145" stroke="#1565c0" stroke-width="2" marker-end="url(#arrow-promo)"/>
    
    <rect x="340" y="160" width="70" height="35" class="node-highlight"/>
    <text x="375" y="182" class="code">double</text>
    <line x1="400" y1="145" x2="375" y2="160" stroke="#1565c0" stroke-width="2" marker-end="url(#arrow-promo)"/>
    
    <text x="70" y="225" class="label-small">✓ Automática: de menor a mayor precisión (sin pérdida de información)</text>
  </g>
  
  <!-- Casting Explícito -->
  <g id="casting">
    <text x="200" y="270" class="subtitle">Casting Explícito (Downcasting)</text>
    
    <rect x="50" y="290" width="550" height="90" class="highlight-box"/>
    
    <text x="70" y="315" class="label-bold">Necesario cuando hay riesgo de pérdida de información:</text>
    
    <text x="70" y="340" class="code">double d = 9.99;</text>
    <text x="70" y="360" class="code">int i = (int) d;</text>
    <text x="240" y="360" class="code-comment">// i = 9 (trunca, no redondea)</text>
    
    <text x="350" y="340" class="code">long l = 3000000000L;</text>
    <text x="350" y="360" class="code">int j = (int) l;</text>
    <text x="480" y="360" class="code-comment">// ⚠️ Overflow!</text>
  </g>
</svg>
