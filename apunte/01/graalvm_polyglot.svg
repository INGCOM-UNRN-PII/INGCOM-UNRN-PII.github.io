<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<?xml-stylesheet href="../../resources/svg.css" type="text/css"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead-primary" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#eb2141"/>
    </marker>
    <marker id="arrowhead-secondary" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#192437"/>
    </marker>
  </defs>
  
  <rect width="600" height="400" class="background"/>

  <!-- Título -->
  <text x="300" y="30" class="title">GraalVM: Ejecución Políglota</text>
  <text x="300" y="50" class="subtitle">Múltiples lenguajes, una máquina virtual</text>

  <!-- Lenguajes de entrada (arriba) -->
  <rect x="30" y="80" width="80" height="50" class="code-block" rx="5"/>
  <text x="70" y="100" class="label-bold" text-anchor="middle">Java</text>
  <text x="70" y="118" class="code" text-anchor="middle">.java</text>

  <rect x="130" y="80" width="80" height="50" class="code-block" rx="5"/>
  <text x="170" y="100" class="label-bold" text-anchor="middle">Kotlin</text>
  <text x="170" y="118" class="code" text-anchor="middle">.kt</text>

  <rect x="230" y="80" width="80" height="50" class="code-block" rx="5"/>
  <text x="270" y="100" class="label-bold" text-anchor="middle">Scala</text>
  <text x="270" y="118" class="code" text-anchor="middle">.scala</text>

  <rect x="330" y="80" width="80" height="50" class="info-box" rx="5"/>
  <text x="370" y="100" class="label-bold" text-anchor="middle">JavaScript</text>
  <text x="370" y="118" class="code" text-anchor="middle">.js</text>

  <rect x="430" y="80" width="80" height="50" class="info-box" rx="5"/>
  <text x="470" y="100" class="label-bold" text-anchor="middle">Python</text>
  <text x="470" y="118" class="code" text-anchor="middle">.py</text>

  <rect x="530" y="80" width="50" height="50" class="info-box" rx="5"/>
  <text x="555" y="108" class="label-bold" text-anchor="middle">...</text>

  <!-- Flechas hacia Truffle -->
  <path d="M 70 130 L 70 155 L 300 155 L 300 170" class="arrow-secondary" fill="none"/>
  <path d="M 170 130 L 170 155" class="arrow-secondary" fill="none"/>
  <path d="M 270 130 L 270 155" class="arrow-secondary" fill="none"/>
  <path d="M 370 130 L 370 155 L 300 155" class="arrow-secondary" fill="none"/>
  <path d="M 470 130 L 470 155 L 300 155" class="arrow-secondary" fill="none"/>
  <path d="M 555 130 L 555 155 L 300 155" class="arrow-secondary" fill="none"/>

  <!-- Truffle Framework -->
  <rect x="100" y="175" width="400" height="50" class="highlight-box" rx="5"/>
  <text x="300" y="195" class="label-bold" text-anchor="middle">Truffle Framework</text>
  <text x="300" y="213" class="label-small" text-anchor="middle">Intérpretes de lenguaje auto-optimizables</text>

  <!-- Flecha hacia Graal -->
  <path d="M 300 225 L 300 245" class="arrow-primary"/>

  <!-- Graal Compiler -->
  <rect x="100" y="250" width="400" height="50" class="highlight-box" rx="5"/>
  <text x="300" y="270" class="label-bold" text-anchor="middle">Graal Compiler (JIT)</text>
  <text x="300" y="288" class="label-small" text-anchor="middle">Compilación Just-In-Time avanzada</text>

  <!-- Flecha hacia salidas -->
  <path d="M 200 300 L 200 330" class="arrow-secondary"/>
  <path d="M 400 300 L 400 330" class="arrow-secondary"/>

  <!-- Salidas -->
  <rect x="80" y="335" width="150" height="50" class="info-box" rx="5"/>
  <text x="155" y="355" class="label-bold" text-anchor="middle">Ejecución JIT</text>
  <text x="155" y="373" class="label-small" text-anchor="middle">Máximo rendimiento</text>

  <rect x="370" y="335" width="150" height="50" class="code-block" rx="5"/>
  <text x="445" y="355" class="label-bold" text-anchor="middle">Native Image</text>
  <text x="445" y="373" class="label-small" text-anchor="middle">Ejecutable AOT</text>

  <!-- Nota lateral -->
  <text x="30" y="360" class="label-small">Modos de</text>
  <text x="30" y="375" class="label-small">ejecución:</text>
</svg>
