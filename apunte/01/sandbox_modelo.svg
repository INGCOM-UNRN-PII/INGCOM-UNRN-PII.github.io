  <text
     x="230"
     y="185"
     class="label-bold"
     id="text9">2. Class Loader Jerárquico</text>
  <text
     x="230"
     y="203"
     class="label-small"
     id="text10">• Separa código confiable del no confiable</text>
  <text
     x="230"
     y="219"
     class="label-small"
     id="text11">• Aísla namespaces entre aplicaciones</text>
