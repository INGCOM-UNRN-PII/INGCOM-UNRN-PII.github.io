     id="text6">1. Verificador de Bytecode</text>
  <text
     x="230"
     y="108"
     class="label-small"
     id="text7">• Verifica estructura del archivo .class</text>
  <text
     x="230"
     y="124"
     class="label-small"
     id="text8">• Detecta código malformado o ilegal</text>
